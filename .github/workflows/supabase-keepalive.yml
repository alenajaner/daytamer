name: Supabase keep-alive

on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sS -o /dev/null -w "%{http_code}\n" \
            "https://cbiqdequtjojsaocktfk.supabase.co/rest/v1/syncs?select=key&limit=1" \
            -H "apikey: sb_publishable_vRvAl4BI1sWlDP3kqX09VQ_yikWV0cz" \
            -H "Authorization: Bearer sb_publishable_vRvAl4BI1sWlDP3kqX09VQ_yikWV0cz"
