  // ── Plan My Day: scheduling algorithm ────────────────────────────────────────
  // Pure function: locked tasks (already carrying a scheduledTime, e.g. meetings)
  // pre-occupy their interval; everything else is sorted by top-3 rank, then
  // priority, then due date, and placed sequentially into the remaining gaps,
  // with a break inserted after every `blockMins` of placed work.
  const timeToMins = t => { const [h,m]=t.split(":").map(Number); return h*60+m; };
  const minsToTime = m => `${String(Math.floor(m/60)%24).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;

  function buildDaySchedule({tasks, workHours, breakCadence}){
    const dayStart = workHours.start*60, dayEnd = workHours.end*60;
    const locked = tasks.filter(t=>t.scheduledTime).map(t=>{
      const start = timeToMins(t.scheduledTime);
      return {task:t, start, end:start+(t.estMinutes||0)};
    }).sort((a,b)=>a.start-b.start);
    const rank = t => (t.topRank && t.topRankDate===todayStr()) ? t.topRank : 99;
    const unplaced = tasks.filter(t=>!t.scheduledTime).sort((a,b)=>{
      const rA=rank(a), rB=rank(b);
      if(rA!==rB) return rA-rB;
      const pA=PRIORITY_WEIGHT[a.priority]||2, pB=PRIORITY_WEIGHT[b.priority]||2;
      if(pA!==pB) return pA-pB;
      const dA=a.dueDate||"9999-99-99", dB=b.dueDate||"9999-99-99";
      if(dA!==dB) return dA<dB?-1:1;
      return 0;
    });
    const overlapsLocked = (pos,dur) => locked.find(l=>pos<l.end && pos+dur>l.start);

    const placements=[], unfit=[];
    let cursor=dayStart, sinceBreak=0;
    for(const t of unplaced){
      const dur = t.estMinutes||0;
      // "before": take the break as soon as the next task would blow the budget,
      // even if that means breaking a little early (no overshoot, ever).
      // "after" (default): let the current task run to completion first, then
      // break — never splits a task, but can overshoot the block by up to one
      // task's length.
      const dueForBreak = breakCadence.mode==="before"
        ? (sinceBreak>0 && sinceBreak+dur>breakCadence.blockMins)
        : (sinceBreak>=breakCadence.blockMins);
      if(dueForBreak){ cursor+=breakCadence.breakMins; sinceBreak=0; }
      let block=overlapsLocked(cursor,dur);
      while(block){ cursor=block.end; sinceBreak=0; block=overlapsLocked(cursor,dur); }
      if(cursor+dur>dayEnd){ unfit.push(t); continue; }
      placements.push({taskId:t.id, startTime:minsToTime(cursor), endTime:minsToTime(cursor+dur)});
      cursor+=dur; sinceBreak+=dur;
    }
    return {
      placements, unfit,
      locked: locked.map(l=>({taskId:l.task.id, startTime:minsToTime(l.start), endTime:minsToTime(l.end)}))
    };
  }

  // ── Plan My Day Modal ────────────────────────────────────────────────────────
  function PlanDayModal({tasks,categories,onAdd,onUpdate,workHours,onWorkHoursChange,breakCadence,onBreakCadenceChange,defaultCat="personal",onClose}){
    const {T,accent}=useTheme();
    const modalRef = useModalA11y(onClose);
    const today = todayStr();
    const [step,setStep]=useState(1);
    const [includedIds,setIncludedIds]=useState(()=>new Set());
    const [excludedIds,setExcludedIds]=useState(()=>new Set());
    const [schedule,setSchedule]=useState(null);

    const inp={width:"100%",background:T.card,color:T.text,borderRadius:12,padding:"10px 14px",fontSize:14,border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"};
    const lbl={fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:700,fontFamily:"'Nunito',sans-serif"};
    const btnPrimary={background:accent,color:"#fff",border:"none",borderRadius:12,padding:"12px",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:`0 2px 8px ${accent}40`,flex:1};
    const btnSecondary={background:"transparent",color:T.muted,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",flex:1};

    const activeTasks = tasks.filter(t=>t.status!=="Done");
    const autoToday = activeTasks.filter(t=>t.scheduledDate===today||t.dueDate===today);
    const workingIds = new Set(autoToday.map(t=>t.id));
    includedIds.forEach(id=>workingIds.add(id));
    excludedIds.forEach(id=>workingIds.delete(id));
    const workingTasks = activeTasks.filter(t=>workingIds.has(t.id));
    const topPicks = tasks.filter(t=>t.topRank&&t.topRankDate===today).sort((a,b)=>a.topRank-b.topRank);
    const missingDuration = workingTasks.filter(t=>!t.estMinutes);

    const toggleToday=(t)=>{
      if(workingIds.has(t.id)){
        setExcludedIds(p=>new Set([...p,t.id]));
        setIncludedIds(p=>{const n=new Set(p); n.delete(t.id); return n;});
      } else {
        setIncludedIds(p=>new Set([...p,t.id]));
        setExcludedIds(p=>{const n=new Set(p); n.delete(t.id); return n;});
      }
    };
    const removeFromToday=(id)=>{ setExcludedIds(p=>new Set([...p,id])); setIncludedIds(p=>{const n=new Set(p); n.delete(id); return n;}); };

    const [newTaskTitle,setNewTaskTitle]=useState("");
    const [newTaskMins,setNewTaskMins]=useState(null);
    const [splitChunks,setSplitChunks]=useState(false);
    const [chunkCount,setChunkCount]=useState(2);
    const addNewToday=()=>{
      if(!newTaskTitle.trim()) return;
      const base={notes:"",category:defaultCat,priority:"Med",sequence:0,dueDate:"",status:"Not Started",assignedTo:"Me",scheduledDate:today,scheduledTime:"",createdAt:new Date().toISOString()};
      if(splitChunks&&newTaskMins&&chunkCount>1){
        const per=Math.round(newTaskMins/chunkCount);
        const ids=[];
        for(let i=1;i<=chunkCount;i++){
          const id=uid();
          const mins = i===chunkCount ? (newTaskMins-per*(chunkCount-1)) : per;
          onAdd({...base,id,title:`${newTaskTitle.trim()} (${i}/${chunkCount})`,estMinutes:mins});
          ids.push(id);
        }
        setIncludedIds(p=>new Set([...p,...ids]));
      } else {
        const id=uid();
        onAdd({...base,id,title:newTaskTitle.trim(),estMinutes:newTaskMins});
        setIncludedIds(p=>new Set([...p,id]));
      }
      setNewTaskTitle(""); setNewTaskMins(null); setSplitChunks(false); setChunkCount(2);
    };

    const toggleTop=(t)=>{
      if(t.topRank&&t.topRankDate===today){ onUpdate(t.id,{topRank:null,topRankDate:null}); return; }
      if(topPicks.length>=3) return;
      onUpdate(t.id,{topRank:topPicks.length+1,topRankDate:today});
    };

    const [mTitle,setMTitle]=useState(""); const [mTime,setMTime]=useState(""); const [mMins,setMMins]=useState(30);
    const addMeeting=()=>{
      if(!mTitle.trim()||!mTime) return;
      onAdd({id:uid(),title:mTitle.trim(),notes:"",category:defaultCat,priority:"Med",sequence:0,dueDate:"",estMinutes:mMins,status:"Not Started",assignedTo:"Me",scheduledDate:today,scheduledTime:mTime,createdAt:new Date().toISOString()});
      setMTitle(""); setMTime("");
    };
    const meetings = workingTasks.filter(t=>t.scheduledTime);

    // Auto-(re)generate whenever the working set, hours, or break settings change
    // while on the results step — so removing an unfit task live-updates the plan
    // instead of requiring a manual re-run.
    const workingSignature = workingTasks.map(t=>`${t.id}:${t.estMinutes}:${t.scheduledTime||""}`).join(",");
    useEffect(()=>{
      if(step!==4) return;
      setSchedule(buildDaySchedule({tasks:workingTasks,workHours,breakCadence}));
    }, [step, workingSignature, workHours.start, workHours.end, breakCadence.blockMins, breakCadence.breakMins]);

    const confirmSchedule=()=>{
      if(!schedule) return;
      schedule.placements.forEach(p=>onUpdate(p.taskId,{scheduledDate:today,scheduledTime:p.startTime}));
      onClose();
    };

    const canNext = step===1 ? (workingTasks.length>0 && missingDuration.length===0) : true;

    const StepHeader=({n,title})=>(
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{width:22,height:22,borderRadius:"50%",background:accent+"22",color:accent,fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</span>
        <span style={{fontWeight:800,color:T.text,fontSize:15,fontFamily:"'Nunito',sans-serif"}}>{title}</span>
      </div>
    );

    return(
      <div ref={modalRef} role="dialog" aria-modal="true" aria-label="Plan my day" tabIndex={-1} style={{position:"fixed",inset:0,zIndex:55,display:"flex",flexDirection:"column",background:T.bg,outline:"none"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
          <button onClick={onClose} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="X" size={20}/></button>
          <span style={{fontWeight:800,color:T.text,fontSize:15,fontFamily:"'Nunito',sans-serif"}}>Plan My Day · Step {step} of 4</span>
          <div style={{width:20}}/>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:16}}>

          {step===1&&(
            <div>
              <StepHeader n={1} title="Which tasks are for today?"/>
              <div style={{color:T.muted,fontSize:12,marginBottom:12,fontFamily:"'Nunito Sans',sans-serif"}}>Toggle everything you plan to work on today. Anything missing a duration needs one before you continue.</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                {activeTasks.map(t=>{
                  const cat=categories.find(c=>c.id===t.category);
                  const included=workingIds.has(t.id);
                  return(
                    <div key={t.id}>
                      <div onClick={()=>toggleToday(t)} style={{display:"flex",alignItems:"center",gap:10,background:included?accent+"14":T.card,border:`1.5px solid ${included?accent+"50":T.border}`,borderLeft:`4px solid ${cat?.color||accent}`,borderRadius:12,padding:"9px 12px",cursor:"pointer"}}>
                        <span style={{width:20,height:20,borderRadius:6,border:`2px solid ${included?accent:T.muted}`,background:included?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {included&&<Icon name="Check" size={12} color="#fff"/>}
                        </span>
                        <span style={{flex:1,fontSize:13,color:T.text,fontWeight:included?700:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                        {t.estMinutes
                          ? <span style={{fontSize:11,color:T.muted,flexShrink:0}}>{fmtMins(t.estMinutes)}</span>
                          : included&&<span style={{fontSize:11,color:"#f59e0b",fontWeight:700,flexShrink:0}}>No duration</span>}
                      </div>
                      {included&&!t.estMinutes&&(
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"8px 4px 0 34px"}}>
                          {EST_OPTIONS.map(m=><button key={m} onClick={()=>onUpdate(t.id,{estMinutes:m})} style={{border:"none",background:T.subtle,color:T.muted,padding:"5px 10px",borderRadius:999,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:600}}>{EST_LABELS[m]}</button>)}
                        </div>
                      )}
                    </div>
                  );
                })}
                {activeTasks.length===0&&<div style={{fontSize:12,color:T.muted,fontStyle:"italic"}}>No open tasks yet — add one below.</div>}
              </div>
              <div style={lbl}>Add something new</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <input value={newTaskTitle} onChange={e=>setNewTaskTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNewToday()} placeholder="New task…" style={inp}/>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {EST_OPTIONS.map(m=><button key={m} onClick={()=>setNewTaskMins(m)} style={{border:`2px solid ${newTaskMins===m?accent:"transparent"}`,background:newTaskMins===m?accent+"22":T.subtle,color:newTaskMins===m?accent:T.muted,padding:"5px 10px",borderRadius:999,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:600}}>{EST_LABELS[m]}</button>)}
                </div>
                <label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:T.muted,cursor:newTaskMins?"pointer":"not-allowed",opacity:newTaskMins?1:0.5,fontFamily:"'Nunito Sans',sans-serif"}}>
                  <input type="checkbox" disabled={!newTaskMins} checked={splitChunks} onChange={e=>setSplitChunks(e.target.checked)} style={{cursor:"pointer",accentColor:accent}}/>
                  Split into smaller chunks
                </label>
                {splitChunks&&newTaskMins&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:T.muted}}>Chunks:</span>
                    <button onClick={()=>setChunkCount(c=>Math.max(2,c-1))} style={{width:26,height:26,borderRadius:8,border:`1.5px solid ${T.border}`,background:T.card,color:T.text,cursor:"pointer",fontWeight:700,fontSize:14}}>−</button>
                    <span style={{fontSize:13,fontWeight:700,color:T.text,minWidth:16,textAlign:"center"}}>{chunkCount}</span>
                    <button onClick={()=>setChunkCount(c=>Math.min(8,c+1))} style={{width:26,height:26,borderRadius:8,border:`1.5px solid ${T.border}`,background:T.card,color:T.text,cursor:"pointer",fontWeight:700,fontSize:14}}>+</button>
                    <span style={{fontSize:11,color:T.muted}}>≈{fmtMins(Math.round(newTaskMins/chunkCount))} each</span>
                  </div>
                )}
                <button onClick={addNewToday} disabled={!newTaskTitle.trim()} style={{...btnPrimary,opacity:!newTaskTitle.trim()?0.5:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon name="Plus" size={16}/> Add</button>
              </div>
            </div>
          )}

          {step===2&&(
            <div>
              <StepHeader n={2} title="What are your top 3 priorities today?"/>
              <div style={{color:T.muted,fontSize:12,marginBottom:12,fontFamily:"'Nunito Sans',sans-serif"}}>Pick up to 3 from today's list. These get scheduled first and marked ⭐.</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {workingTasks.map(t=>{
                  const ranked = t.topRank&&t.topRankDate===today;
                  const disabled = !ranked&&topPicks.length>=3;
                  return(
                    <button key={t.id} onClick={()=>toggleTop(t)} disabled={disabled}
                      style={{display:"flex",alignItems:"center",gap:10,textAlign:"left",background:ranked?accent+"14":T.card,border:`1.5px solid ${ranked?accent+"50":T.border}`,borderRadius:12,padding:"9px 12px",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,fontFamily:"'Nunito Sans',sans-serif"}}>
                      <span style={{width:22,height:22,borderRadius:"50%",background:ranked?accent:T.subtle,color:ranked?"#fff":T.muted,fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{ranked?t.topRank:""}</span>
                      <span style={{flex:1,fontSize:13,color:T.text,fontWeight:ranked?700:500}}>{t.title}</span>
                    </button>
                  );
                })}
                {workingTasks.length===0&&<div style={{fontSize:12,color:T.muted,fontStyle:"italic"}}>No tasks selected for today yet.</div>}
              </div>
            </div>
          )}

          {step===3&&(
            <div>
              <StepHeader n={3} title="Planning mode"/>
              <div style={{color:T.muted,fontSize:12,marginBottom:12,fontFamily:"'Nunito Sans',sans-serif"}}>Work hours and breaks are saved as your defaults. Add any meetings so the schedule builds around them.</div>
              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1}}>
                  <div style={lbl}>Start time</div>
                  <select value={workHours.start} onChange={e=>onWorkHoursChange({...workHours,start:parseInt(e.target.value)})} style={{...inp,cursor:"pointer"}}>
                    {Array.from({length:24},(_,i)=><option key={i} value={i}>{i===0?"12:00 AM":i<12?`${i}:00 AM`:i===12?"12:00 PM":`${i-12}:00 PM`}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <div style={lbl}>End time</div>
                  <select value={workHours.end} onChange={e=>onWorkHoursChange({...workHours,end:parseInt(e.target.value)})} style={{...inp,cursor:"pointer"}}>
                    {Array.from({length:24},(_,i)=><option key={i} value={i}>{i===0?"12:00 AM":i<12?`${i}:00 AM`:i===12?"12:00 PM":`${i-12}:00 PM`}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginBottom:20}}>
                <div style={{flex:1}}>
                  <div style={lbl}>Break every</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min="15" max="480" value={breakCadence.blockMins} onChange={e=>onBreakCadenceChange({...breakCadence,blockMins:parseInt(e.target.value)||90})} style={inp}/>
                    <span style={{fontSize:12,color:T.muted,whiteSpace:"nowrap"}}>min work</span>
                  </div>
                </div>
                <div style={{flex:1}}>
                  <div style={lbl}>Break length</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min="1" max="120" value={breakCadence.breakMins} onChange={e=>onBreakCadenceChange({...breakCadence,breakMins:parseInt(e.target.value)||10})} style={inp}/>
                    <span style={{fontSize:12,color:T.muted,whiteSpace:"nowrap"}}>min</span>
                  </div>
                </div>
              </div>
              <div style={lbl}>When a task would blow the budget</div>
              <div style={{display:"flex",gap:8,marginBottom:20}}>
                <button onClick={()=>onBreakCadenceChange({...breakCadence,mode:"after"})}
                  style={{flex:1,textAlign:"left",border:`1.5px solid ${(breakCadence.mode||"after")==="after"?accent:T.border}`,background:(breakCadence.mode||"after")==="after"?accent+"14":T.card,borderRadius:12,padding:"9px 12px",cursor:"pointer",fontFamily:"'Nunito Sans',sans-serif"}}>
                  <div style={{fontSize:12,fontWeight:700,color:(breakCadence.mode||"after")==="after"?accent:T.text}}>Break after</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:2}}>Finish the task first, break right after — may run a bit over</div>
                </button>
                <button onClick={()=>onBreakCadenceChange({...breakCadence,mode:"before"})}
                  style={{flex:1,textAlign:"left",border:`1.5px solid ${breakCadence.mode==="before"?accent:T.border}`,background:breakCadence.mode==="before"?accent+"14":T.card,borderRadius:12,padding:"9px 12px",cursor:"pointer",fontFamily:"'Nunito Sans',sans-serif"}}>
                  <div style={{fontSize:12,fontWeight:700,color:breakCadence.mode==="before"?accent:T.text}}>Break before</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:2}}>Take the break before starting — never runs over, may break early</div>
                </button>
              </div>
              <div style={lbl}>Fixed-time meetings</div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                <input value={mTitle} onChange={e=>setMTitle(e.target.value)} placeholder="e.g. Team sync" style={inp}/>
                <div style={{display:"flex",gap:8}}>
                  <input type="time" value={mTime} onChange={e=>setMTime(e.target.value)} style={{...inp,flex:1}}/>
                  <select value={mMins} onChange={e=>setMMins(parseInt(e.target.value))} style={{...inp,flex:1,cursor:"pointer"}}>
                    {EST_OPTIONS.map(m=><option key={m} value={m}>{EST_LABELS[m]}</option>)}
                  </select>
                </div>
                <button onClick={addMeeting} disabled={!mTitle.trim()||!mTime} style={{...btnPrimary,opacity:(!mTitle.trim()||!mTime)?0.5:1,cursor:(!mTitle.trim()||!mTime)?"not-allowed":"pointer"}}>Add</button>
              </div>
              {meetings.length>0&&(
                <div>
                  {[...meetings].sort((a,b)=>a.scheduledTime<b.scheduledTime?-1:1).map(t=>(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,background:T.card,borderRadius:12,padding:"9px 12px",marginBottom:6}}>
                      <span style={{fontSize:12,color:"#7DCFCB",fontWeight:700}}>{formatTime(t.scheduledTime)}</span>
                      <span style={{flex:1,fontSize:13,color:T.text,fontWeight:600}}>{t.title}</span>
                      <button onClick={()=>onUpdate(t.id,{scheduledTime:""})} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="X" size={14}/></button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {step===4&&(
            <div>
              <StepHeader n={4} title="Your schedule"/>
              {!schedule
                ? <div style={{color:T.muted,fontSize:13}}>Generating…</div>
                : (()=>{
                    const all=[
                      ...schedule.locked.map(x=>({...x,locked:true})),
                      ...schedule.placements.map(x=>({...x,locked:false})),
                    ].sort((a,b)=>a.startTime<b.startTime?-1:1);
                    const rows=[]; let prevEnd=null;
                    all.forEach(item=>{
                      if(prevEnd&&timeToMins(item.startTime)>timeToMins(prevEnd)) rows.push({type:"break",mins:timeToMins(item.startTime)-timeToMins(prevEnd)});
                      rows.push({type:"task",...item});
                      prevEnd=item.endTime;
                    });
                    return(
                      <>
                        {rows.map((r,i)=>{
                          if(r.type==="break") return <div key={i} style={{fontSize:11,color:T.muted,padding:"4px 0",textAlign:"center",fontStyle:"italic"}}>☕ {r.mins}m break</div>;
                          const t=tasks.find(x=>x.id===r.taskId); if(!t) return null;
                          const cat=categories.find(c=>c.id===t.category);
                          return(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:T.card,borderRadius:12,borderLeft:`4px solid ${cat?.color||accent}`,padding:"9px 12px",marginBottom:6}}>
                              <span style={{fontSize:12,color:"#7DCFCB",fontWeight:700,width:56,flexShrink:0}}>{formatTime(r.startTime)}</span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:13,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
                                  {t.topRank&&t.topRankDate===today&&"⭐"}{r.locked&&"🔒"}{t.title}
                                </div>
                                <div style={{fontSize:11,color:T.muted}}>{fmtMins(t.estMinutes)}</div>
                              </div>
                            </div>
                          );
                        })}
                        {schedule.unfit.length>0&&(
                          <div style={{marginTop:12,background:"#ef444418",border:"1.5px solid #ef444450",borderRadius:12,padding:12}}>
                            <div style={{fontSize:12,fontWeight:700,color:"#ef4444",marginBottom:8,fontFamily:"'Nunito',sans-serif"}}>⚠️ Not enough time today for {schedule.unfit.length} task{schedule.unfit.length>1?"s":""} — remove some to fit the rest</div>
                            {schedule.unfit.map(t=>(
                              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0"}}>
                                <span style={{flex:1,fontSize:12,color:T.text}}>{t.title} ({fmtMins(t.estMinutes)})</span>
                                <button onClick={()=>removeFromToday(t.id)} style={{background:"#ef444422",border:"1px solid #ef444460",color:"#ef4444",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",flexShrink:0}}>Remove</button>
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    );
                  })()
              }
            </div>
          )}

        </div>
        <div style={{display:"flex",gap:10,padding:"12px 16px 24px",borderTop:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
          {step>1&&<button onClick={()=>setStep(s=>s-1)} style={btnSecondary}>Back</button>}
          {step<4&&<button disabled={!canNext} onClick={()=>setStep(s=>s+1)} style={{...btnPrimary,opacity:canNext?1:0.5,cursor:canNext?"pointer":"not-allowed"}}>Next</button>}
          {step===4&&<button onClick={confirmSchedule} disabled={!schedule} style={{...btnPrimary,opacity:schedule?1:0.5}}>Confirm & schedule</button>}
        </div>
      </div>
    );
  }

  // ── List Tab ──────────────────────────────────────────────────────────────────
  function ListTab({tasks,categories,onEdit,onStatusChange,onAdd,savedSorts,onSaveSorts,onFocus,doneVis="instant",defaultCat="personal",savedFilters=[],onSaveFilters}){
    const [showPast,setShowPast]=useState(false);
    const [viewMode,setViewMode]=useState("list"); // list | table
    const [editingCell,setEditingCell]=useState(null); // {taskId, field}
    const [gridFilter,setGridFilter]=useState("all"); // all | today | overdue | unscheduled
    const [gridSortCol,setGridSortCol]=useState(null); // {col, dir}
    const toggleGridSort=(col)=>setGridSortCol(p=>p?.col===col?{col,dir:p.dir==="asc"?"desc":"asc"}:{col,dir:"asc"});
    const [selectedIds,setSelectedIds]=useState(new Set());
    const [selectMode,setSelectMode]=useState(false);
    const [showBulkSched,setShowBulkSched]=useState(false);
    const [bulkSchedDate,setBulkSchedDate]=useState("");
    const toggleSelect=(id)=>setSelectedIds(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
    const selectAll=()=>setSelectedIds(new Set(sorted.map(t=>t.id)));
    const clearSelect=()=>setSelectedIds(new Set());
    const toggleSelectMode=()=>{setSelectMode(m=>{if(m)clearSelect();return !m;});};
    const bulkDone=()=>{selectedIds.forEach(id=>onStatusChange(id,"Done"));clearSelect();};
    const bulkDelete=()=>{selectedIds.forEach(id=>onEdit({id,_delete:true}));clearSelect();};
    const bulkSchedule=(date)=>{selectedIds.forEach(id=>{const t=tasks.find(x=>x.id===id);if(t)onEdit({...t,scheduledDate:date});});clearSelect();setShowBulkSched(false);}; 
    const [filterPresetName,setFilterPresetName]=useState("");
    const [showSaveFilter,setShowSaveFilter]=useState(false);
    const {T,accent}=useTheme();
    const [title,setTitle]=useState("");
    const titleInputRef=useRef(null);
    const [titleFocused,setTitleFocused]=useState(false);
    const [qPriority,setQPriority]=useState("Med");
    const [qCat,setQCat]=useState(defaultCat||"personal");
    const [qMins,setQMins]=useState(30);
    const [qDate,setQDate]=useState("");
    const [qTime,setQTime]=useState("");
    const [qSchedMode,setQSchedMode]=useState("none");
    const [filterCat,setFilterCat]=useState([]);
    const [filterStatus,setFilterStatus]=useState([]);
    const [sortLevels,setSortLevels]=useState([]);
    const [showSortBuilder,setShowSortBuilder]=useState(false);
    const [saveName,setSaveName]=useState("");
    const [showSaveName,setShowSaveName]=useState(false);

    const handleAdd=()=>{if(!title.trim())return;onAdd({id:uid(),title:title.trim(),notes:"",category:qCat,priority:qPriority,sequence:tasks.length+1,dueDate:"",estMinutes:qMins,status:"Not Started",assignedTo:"Me",scheduledDate:qDate,scheduledTime:qTime,createdAt:new Date().toISOString()});setTitle("");setQDate("");setQTime("");setQSchedMode("none");};
    const toggleArr=(arr,setArr,v)=>setArr(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);
    const addLevel=()=>{if(sortLevels.length>=4)return;const used=sortLevels.map(l=>l.field);const next=SORT_FIELDS.find(f=>!used.includes(f.value));if(next)setSortLevels([...sortLevels,{field:next.value,dir:"asc"}]);};
    const updateLevel=(i,k,v)=>setSortLevels(sortLevels.map((l,idx)=>idx===i?{...l,[k]:v}:l));
    const removeLevel=i=>setSortLevels(sortLevels.filter((_,idx)=>idx!==i));
    const moveLevel=(i,dir)=>{const arr=[...sortLevels],j=i+dir;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];setSortLevels(arr);};
    const applyPreset=p=>{setSortLevels(p.levels);setShowSortBuilder(false);};
    const applyFilterPreset=p=>{
      if(p.filterCat)setFilterCat(p.filterCat);
      if(p.filterStatus)setFilterStatus(p.filterStatus);
      if(p.sortLevels)setSortLevels(p.sortLevels);
      if(p.gridFilter)setGridFilter(p.gridFilter);
    };
    const saveFilterPreset=()=>{
      if(!filterPresetName.trim())return;
      onSaveFilters([...savedFilters,{id:uid(),name:filterPresetName.trim(),filterCat,filterStatus,sortLevels,gridFilter}]);
      setFilterPresetName("");setShowSaveFilter(false);
    };
    const saveSort=()=>{if(!saveName.trim())return;onSaveSorts([...savedSorts,{id:uid(),name:saveName.trim(),levels:sortLevels}]);setSaveName("");setShowSaveName(false);};

    // Memoized so typing in the quick-add box or other unrelated re-renders
    // don't re-filter/re-sort the whole task list on every keystroke.
    const {sorted,sortedPast}=useMemo(()=>{
      let filtered=[...tasks];
      if(filterCat.length)filtered=filtered.filter(t=>filterCat.includes(t.category));
      if(filterStatus.length)filtered=filtered.filter(t=>filterStatus.includes(t.status));
      const nowMs = Date.now();
      const oneDayMs = 24*60*60*1000;
      const isPast = t => {
        if(t.status!=="Done") return false;
        if(doneVis==="always") return false;               // always show in main list
        if(doneVis==="instant") return true;               // move immediately
        if(doneVis==="24h") return t.completedAt &&        // move after 24h grace
          nowMs - new Date(t.completedAt).getTime() >= oneDayMs;
        return false;
      };
      const activeTasks = filtered.filter(t => !isPast(t));
      const pastTasks = tasks.filter(t => isPast(t));
      return {sorted: applySortLevels(activeTasks,sortLevels,categories), sortedPast: applySortLevels(pastTasks,sortLevels,categories)};
    }, [tasks, filterCat, filterStatus, doneVis, sortLevels, categories]);

    const chip=(active,color,onClick,label)=>(
      <button onClick={onClick} style={{flexShrink:0,border:`1.5px solid ${active?color:T.border}`,color:active?color:T.muted,background:active?color+"18":T.card,padding:"4px 12px",borderRadius:999,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:active?700:500}}>{label}</button>
    );
    const sel={background:T.subtle,color:T.text,fontSize:12,borderRadius:8,padding:"5px 8px",border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"};

    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"12px 16px 10px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
          <div style={{display:"flex",gap:8,marginBottom:title?8:10}}>
            <input ref={titleInputRef} value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()}
              onFocus={()=>setTitleFocused(true)} onBlur={()=>setTitleFocused(false)}
              style={{flex:1,background:T.card,color:T.text,borderRadius:12,padding:"11px 16px",fontSize:14,border:`1.5px solid ${title||titleFocused?accent:T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif",transition:"border 0.15s",boxShadow:titleFocused?`0 0 0 3px ${accent}25`:"none"}}
              placeholder="Start typing to add a task…"/>
            <button onClick={()=>title.trim()?handleAdd():titleInputRef.current?.focus()}
              style={{background:title.trim()?accent:T.subtle,color:title.trim()?"#fff":T.muted,border:"none",borderRadius:12,padding:"0 16px",cursor:"pointer",display:"flex",alignItems:"center",boxShadow:title.trim()?`0 2px 8px ${accent}50`:"none",transition:"background 0.15s"}}><Icon name={title.trim()?"Check":"Plus"} size={18}/></button>
          </div>
          {title&&(
            <div style={{background:T.card,borderRadius:12,padding:"10px 12px",border:`1.5px solid ${accent}30`,display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
              <div>
                <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>Priority</div>
                <div style={{display:"flex",gap:6}}>
                  {["High","Med","Low"].map(p=>(
                    <button key={p} onClick={()=>setQPriority(p)}
                      style={{flex:1,border:`2px solid ${qPriority===p?PRIORITY_COLORS[p]:"transparent"}`,background:qPriority===p?PRIORITY_COLORS[p]+"22":T.subtle,color:qPriority===p?PRIORITY_COLORS[p]:T.muted,padding:"5px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>Category</div>
                <div style={{display:"flex",gap:6,overflowX:"auto"}} className="hide-scrollbar">
                  {categories.map(c=>(
                    <button key={c.id} onClick={()=>setQCat(c.id)}
                      style={{flexShrink:0,border:`2px solid ${qCat===c.id?c.color:"transparent"}`,background:qCat===c.id?c.color+"22":T.subtle,color:qCat===c.id?c.color:T.muted,padding:"4px 10px",borderRadius:999,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                      {qCat===c.id&&<span style={{width:6,height:6,borderRadius:"50%",background:c.color,display:"inline-block"}}/>}
                      {c.name}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>Duration</div>
                <div style={{display:"flex",gap:6,overflowX:"auto"}} className="hide-scrollbar">
                  {[15,30,45,60,90,120].map(m=>(
                    <button key={m} onClick={()=>setQMins(m)}
                      style={{flexShrink:0,border:`2px solid ${qMins===m?accent:"transparent"}`,background:qMins===m?accent+"22":T.subtle,color:qMins===m?accent:T.muted,padding:"4px 10px",borderRadius:999,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                      {fmtMins(m)}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:10,color:T.muted,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>When</div>
                <div style={{display:"flex",gap:6,marginBottom:qSchedMode!=="none"?6:0}}>
                {[{id:"none",label:"No date"},{id:"today",label:"Today"},{id:"later",label:"Schedule later"}].map(opt=>(
                  <button key={opt.id} onClick={()=>{
                    setQSchedMode(opt.id);
                    if(opt.id==="today"){setQDate(todayStr());}
                    else if(opt.id==="none"){setQDate("");setQTime("");}
                  }}
                    style={{flex:1,padding:"5px 4px",borderRadius:8,border:`2px solid ${qSchedMode===opt.id?accent:"transparent"}`,background:qSchedMode===opt.id?accent+"22":T.subtle,color:qSchedMode===opt.id?accent:T.muted,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>
                    {opt.label}
                  </button>
                ))}
              </div>
              {qSchedMode!=="none"&&(
                <div style={{display:"flex",gap:6}}>
                  {qSchedMode==="later"&&(
                    <div style={{flex:1,position:"relative"}}>
                      <input type="date" value={qDate} onChange={e=>setQDate(e.target.value)}
                        style={{width:"100%",background:T.card,color:qDate?T.text:T.muted,borderRadius:10,padding:"6px 10px",fontSize:12,border:`1.5px solid ${qDate?accent:T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"}}/>
                    </div>
                  )}
                  <div style={{flex:1,position:"relative"}}>
                    <input type="time" value={qTime} onChange={e=>setQTime(e.target.value)}

                      </td>
                    </tr>
                  );
                })}
