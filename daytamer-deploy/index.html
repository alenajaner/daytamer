  }

  async function sbSet(syncKey, data) {
    await fetch(`${SB_URL}/rest/v1/syncs`, {
      method: "POST",
      headers: {
        "apikey": SB_KEY,
        "Authorization": `Bearer ${SB_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({key: syncKey, data, updated_at: new Date().toISOString()})
    });
  }

  function App(){
    const [tab,setTab]=useState("today");
    const [wideMode,setWideMode]=useState(()=>LS.get("dt_wide",false));
    const [showSearch,setShowSearch]=useState(false);
    const [searchQuery,setSearchQuery]=useState("");
    const [tasks,setTasks]=useState(()=>LS.get("dt_tasks",[]));
    const [goals,setGoals]=useState(()=>LS.get("dt_goals",[]));
    const [deletedIds,setDeletedIds]=useState(()=>LS.get("dt_deleted",[]));
    const [categories,setCategories]=useState(()=>LS.get("dt_categories",DEFAULT_CATEGORIES));
    const [savedSorts,setSavedSorts]=useState(()=>LS.get("dt_sorts",DEFAULT_SORTS));
    const [savedFilters,setSavedFilters]=useState(()=>LS.get("dt_filters",[]));
    const [editTask,setEditTask]=useState(null);
    const [showSettings,setShowSettings]=useState(false);
    const [showWheel,setShowWheel]=useState(false);
    const [focusTask,setFocusTask]=useState(null);
    const [wheelWinner,setWheelWinner]=useState(null);
    const [dayTarget,setDayTarget]=useState(null);
    const [storageError,setStorageError]=useState(false);
    useEffect(()=>{
      const onErr=()=>{ setStorageError(true); setTimeout(()=>setStorageError(false),4000); };
      window.addEventListener("dt-storage-error",onErr);
      return ()=>window.removeEventListener("dt-storage-error",onErr);
    },[]);
    const [themeId,setThemeId]=useState(()=>LS.get("dt_theme","sunrise"));
    const [isDark,setIsDark]=useState(()=>LS.get("dt_dark",false));
    const [dayHours,setDayHours]=useState(()=>LS.get("dt_dayhours",{start:6,end:22}));
    const [slotMins,setSlotMins]=useState(()=>LS.get("dt_slotmins",15)); // 15 | 30 | 60
    const [workHours,setWorkHours]=useState(()=>LS.get("dt_workhours",{start:9,end:17}));
    const [breakCadence,setBreakCadence]=useState(()=>LS.get("dt_breakcadence",{blockMins:90,breakMins:10,mode:"after"}));
    const [showPlanDay,setShowPlanDay]=useState(false);
    const [doneVis,setDoneVis]=useState(()=>LS.get("dt_donevis","instant"));
    const [defaultCat,setDefaultCat]=useState(()=>LS.get("dt_defaultcat","personal"));
    const [syncKey,setSyncKey]=useState(()=>LS.get("dt_synckey",""));
    const [syncStatus,setSyncStatus]=useState("idle");
    const syncTimer = useRef(null);

    // ── Clean sync: last updatedAt wins, always ──────────────────────────────
    const mergeById = (localArr, cloudArr, deletedIds) => {
      const byId = {};
      (localArr||[]).forEach(x=>{ if(!deletedIds||!deletedIds.has(x.id)) byId[x.id]=x; });
      (cloudArr||[]).forEach(cx=>{
        if(deletedIds&&deletedIds.has(cx.id)) return;
        const lx = byId[cx.id];
        if(!lx) { byId[cx.id]=cx; return; }
        const lTime = lx.updatedAt||lx.createdAt||"0";
        const cTime = cx.updatedAt||cx.createdAt||"0";
        if(cTime > lTime) byId[cx.id]=cx;
      });
      return Object.values(byId);
    };

    const pushSync = useCallback(async () => {
      if(!syncKey) return;
      setSyncStatus("syncing");
      try {
        const snapshot = {
          tasks: JSON.parse(localStorage.getItem("dt_tasks")||"[]"),
          goals: JSON.parse(localStorage.getItem("dt_goals")||"[]"),
          categories: JSON.parse(localStorage.getItem("dt_categories")||"[]"),
          deletedIds: JSON.parse(localStorage.getItem("dt_deleted")||"[]"),
          savedSorts: JSON.parse(localStorage.getItem("dt_sorts")||"[]"),
          dayHours: JSON.parse(localStorage.getItem("dt_dayhours")||"null"),
          doneVis: JSON.parse(localStorage.getItem("dt_donevis")||'"instant"'),
          defaultCat: JSON.parse(localStorage.getItem("dt_defaultcat")||'"personal"'),
          workHours: JSON.parse(localStorage.getItem("dt_workhours")||"null"),
          breakCadence: JSON.parse(localStorage.getItem("dt_breakcadence")||"null"),
        };
        await sbSet(syncKey, snapshot);
        setSyncStatus("ok");
        setTimeout(()=>setSyncStatus("idle"), 2000);
      } catch(e) { setSyncStatus("error"); }
    }, [syncKey]);

    const pullSync = useCallback(async () => {
      if(!syncKey) return;
      setSyncStatus("syncing");
      try {
        const cloud = await sbGet(syncKey);
        if(!cloud) { setSyncStatus("ok"); setTimeout(()=>setSyncStatus("idle"),2000); return; }

        const localDeletedIds = new Set(JSON.parse(localStorage.getItem("dt_deleted")||"[]"));
        const cloudDeletedIds = new Set(cloud.deletedIds||[]);
        const allDeletedIds = new Set([...localDeletedIds, ...cloudDeletedIds]);

        // Merge deletedIds
        if(cloud.deletedIds?.length) setDeletedIds(p=>[...new Set([...p,...cloud.deletedIds])]);

        // Merge tasks: last updatedAt wins
        if(cloud.tasks?.length) setTasks(local => mergeById(local, cloud.tasks, allDeletedIds));

        // Merge goals: last updatedAt wins
        if(cloud.goals?.length) setGoals(local => mergeById(local, cloud.goals, new Set()));

        // Settings: just take cloud values (rarely conflict)
        if(cloud.categories?.length) setCategories(cloud.categories);
        if(cloud.savedSorts) setSavedSorts(cloud.savedSorts);
        if(cloud.dayHours) setDayHours(cloud.dayHours);
        if(cloud.doneVis) setDoneVis(cloud.doneVis);
        if(cloud.defaultCat) setDefaultCat(cloud.defaultCat);
        if(cloud.workHours) setWorkHours(cloud.workHours);
        if(cloud.breakCadence) setBreakCadence(cloud.breakCadence);

        setSyncStatus("ok");
        setTimeout(()=>setSyncStatus("idle"), 2000);
      } catch(e) { setSyncStatus("error"); }
    }, [syncKey]);

    // Persist to localStorage whenever state changes
    useEffect(()=>LS.set("dt_tasks",tasks),[tasks]);
    useEffect(()=>LS.set("dt_goals",goals),[goals]);
    useEffect(()=>LS.set("dt_deleted",deletedIds),[deletedIds]);
    useEffect(()=>LS.set("dt_categories",categories),[categories]);
    useEffect(()=>LS.set("dt_sorts",savedSorts),[savedSorts]);
    useEffect(()=>LS.set("dt_filters",savedFilters),[savedFilters]);
    useEffect(()=>LS.set("dt_theme",themeId),[themeId]);
    useEffect(()=>LS.set("dt_dark",isDark),[isDark]);
    useEffect(()=>LS.set("dt_wide",wideMode),[wideMode]);
    useEffect(()=>LS.set("dt_dayhours",dayHours),[dayHours]);
    useEffect(()=>LS.set("dt_slotmins",slotMins),[slotMins]);
    useEffect(()=>LS.set("dt_workhours",workHours),[workHours]);
    useEffect(()=>LS.set("dt_breakcadence",breakCadence),[breakCadence]);
    useEffect(()=>LS.set("dt_donevis",doneVis),[doneVis]);
    useEffect(()=>LS.set("dt_synckey",syncKey),[syncKey]);
    useEffect(()=>LS.set("dt_defaultcat",defaultCat),[defaultCat]);

    // Auto-push: debounced 2s after any data change. The cloud row is a single JSON
    // blob overwritten on every push (no server-side merge), so we pull the latest
    // cloud data and merge it in first — otherwise this device's push could silently
    // wipe out an edit another device pushed moments earlier.
    useEffect(()=>{
      if(!syncKey) return;
      clearTimeout(syncTimer.current);
      // Capture current state in closure so push uses fresh values
      const localSnapshot = {tasks, goals, categories, deletedIds, savedSorts, dayHours, doneVis, defaultCat, workHours, breakCadence};
      syncTimer.current = setTimeout(async ()=>{
        if(!syncKey) return;
        setSyncStatus("syncing");
        let toPush = localSnapshot;
        try {
          const cloud = await sbGet(syncKey);
          if(cloud){
            const allDeletedIds = new Set([...(localSnapshot.deletedIds||[]), ...(cloud.deletedIds||[])]);
            const mergedTasks = mergeById(localSnapshot.tasks, cloud.tasks, allDeletedIds);
            const mergedGoals = mergeById(localSnapshot.goals, cloud.goals, new Set());
            toPush = {...localSnapshot, tasks: mergedTasks, goals: mergedGoals, deletedIds: [...allDeletedIds]};
            // Reflect the merge locally too (only if it actually changed something —
            // calling setState unconditionally here would re-trigger this same effect
            // every time and loop forever pulling/pushing on an idle app)
            const tasksChanged = JSON.stringify(mergedTasks) !== JSON.stringify(localSnapshot.tasks);
            const goalsChanged = JSON.stringify(mergedGoals) !== JSON.stringify(localSnapshot.goals);
            if(tasksChanged) setTasks(mergedTasks);
            if(goalsChanged) setGoals(mergedGoals);
            if(cloud.deletedIds?.some(id=>!localSnapshot.deletedIds?.includes(id))) setDeletedIds([...allDeletedIds]);
          }
        } catch(e) { /* pre-push pull failed — fall back to pushing local state as-is */ }
        sbSet(syncKey, toPush)
          .then(()=>{ setSyncStatus("ok"); setTimeout(()=>setSyncStatus("idle"),2000); })
          .catch(()=>setSyncStatus("error"));
      }, 2000);
      return ()=>clearTimeout(syncTimer.current);
    }, [tasks, goals, categories, deletedIds, savedSorts, dayHours, doneVis, defaultCat, workHours, breakCadence, syncKey]);

    // Pull on mount
    useEffect(()=>{ if(syncKey) pullSync(); }, []);

    // Pull when syncKey is entered for first time
    const pullTimer = useRef(null);
    useEffect(()=>{
      if(!syncKey) return;
      clearTimeout(pullTimer.current);
      pullTimer.current = setTimeout(()=>pullSync(), 1000);
      return ()=>clearTimeout(pullTimer.current);
    }, [syncKey]);

    const themeData=useMemo(()=>{const theme=THEMES[themeId];const T=isDark?theme.dark:theme.light;return{T,accent:theme.accent};}, [themeId,isDark]);
    const {T,accent}=themeData;

    useEffect(()=>{
      document.body.style.background=T.bg;
      let s=document.getElementById("dt-s")||document.createElement("style");
      s.id="dt-s";
      s.textContent=`::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px;} select option{background:${T.card};color:${T.text};}`;
      document.head.appendChild(s);
    },[T]);

    const now=()=>new Date().toISOString();
    const addTask=t=>setTasks(p=>[...p,{...t,updatedAt:now()}]);
    const saveTask=t=>setTasks(p=>p.map(x=>x.id===t.id?{...t,updatedAt:now()}:x));
    const deleteTask=id=>{setTasks(p=>p.filter(x=>x.id!==id));setDeletedIds(p=>[...new Set([...p,id])]);};
    const updateTask=(id,patch)=>setTasks(p=>p.map(x=>x.id===id?{...x,...patch,updatedAt:now()}:x));
    const deleteCategory=id=>{
      const fallback=categories.find(x=>x.id!==id)?.id||"";
      if(defaultCat===id)setDefaultCat(fallback);
      setTasks(p=>p.map(x=>x.category===id?{...x,category:fallback,updatedAt:now()}:x));
      setGoals(p=>p.map(x=>x.category===id?{...x,category:fallback}:x));
      setCategories(p=>p.filter(x=>x.id!==id));
    };
    const handleSave=t=>{
      // Saved instances never carry a `repeat` value (see `base` below), so this
      // branch only fires when Repeat is explicitly set/changed on an occurrence —
      // ordinary field edits (title, status, notes, etc.) fall through to a plain
      // single-task save and never touch the rest of the series.
      if(t.repeat&&t.scheduledDate){
        // Expand recurring task into instances
        const base={...t,repeat:"",repeatEnd:""};
        const instances=[];
        const start=new Date(t.scheduledDate+"T00:00:00");
        const end=t.repeatEnd?new Date(t.repeatEnd+"T00:00:00"):new Date(start.getTime()+365*86400000);
        const isWeekday=d=>[1,2,3,4,5].includes(d.getDay());
        const isWeekend=d=>[0,6].includes(d.getDay());
        let cur=new Date(start);
        let count=0;
        const maxInst=365;
        while(cur<=end&&count<maxInst){
          let include=false;
          if(t.repeat==="daily")include=true;
          else if(t.repeat==="weekdays")include=isWeekday(cur);
          else if(t.repeat==="weekends")include=isWeekend(cur);
          else if(t.repeat==="weekly")include=(cur-start)%(7*86400000)===0;
          else if(t.repeat==="monthly")include=cur.getDate()===start.getDate();
          if(include){
            const dateStr=cur.toISOString().slice(0,10);
            instances.push({...base,id:count===0?t.id:uid(),scheduledDate:dateStr,createdAt:new Date().toISOString(),updatedAt:now()});
            count++;
          }
          cur=new Date(cur.getTime()+86400000);
        }
        // Only replace this occurrence's group from its date forward — earlier
        // occurrences of the series (including already-completed ones) are left
        // untouched. Removed instances are marked deleted so a later sync pull
        // can't resurrect them from another device's stale cloud copy.
        const groupId=t.repeatGroupId||t.id;
        const toRemove=tasks.filter(x=>x.repeatGroupId===groupId&&x.scheduledDate>=t.scheduledDate&&x.id!==t.id);
        if(toRemove.length) setDeletedIds(p=>[...new Set([...p,...toRemove.map(x=>x.id)])]);
        setTasks(p=>{
          const removeIds=new Set(toRemove.map(x=>x.id));
          const kept=p.filter(x=>!removeIds.has(x.id)&&x.id!==t.id);
          return [...kept,...instances.map(inst=>({...inst,repeatGroupId:groupId}))];
        });
      } else {
        saveTask(t);
      }
      setEditTask(null);
    };
    const handleDelete=id=>{deleteTask(id);setEditTask(null);};
    const handleDayClick=d=>{setDayTarget(d);setTab("day");};
    const handleGoToDay=()=>{setDayTarget(todayStr());setTab("day");};

    return(
      <ThemeCtx.Provider value={themeData}>
        <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:wideMode?"100%":480,margin:"0 auto",background:T.bg,fontFamily:"'Nunito Sans',sans-serif",transition:"max-width 0.2s"}}>

          {/* Header */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px 10px",borderBottom:`1px solid #EDD9BC`,flexShrink:0,background:"#FFFFFF",boxShadow:"0 1px 0 #EDD9BC"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <SunLogo size={36}/>
              <div>
                <div style={{color:"#3D4A5C",fontWeight:800,fontSize:18,letterSpacing:"-0.02em",lineHeight:1.1,fontFamily:"'Nunito',sans-serif"}}>DayTamer</div>
                <div style={{color:"#8A7A68",fontSize:11,fontStyle:"italic",fontFamily:"'Nunito Sans',sans-serif"}}>Tame the day.</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {syncKey&&(
                <button onClick={async()=>{await pushSync();await pullSync();}} title="Sync now"
                  style={{background:T.card,border:`1.5px solid ${syncStatus==="ok"?"#4ade80":syncStatus==="error"?"#f87171":syncStatus==="syncing"?accent:T.border}`,color:syncStatus==="syncing"?accent:syncStatus==="ok"?"#4ade80":syncStatus==="error"?"#f87171":T.muted,cursor:"pointer",display:"flex",padding:"7px",borderRadius:10,transition:"all 0.2s"}}>
                  <Icon name="RefreshCw" size={16} color={syncStatus==="syncing"?accent:syncStatus==="ok"?"#4ade80":syncStatus==="error"?"#f87171":T.muted}/>
                </button>
              )}
              <button onClick={()=>{setShowSearch(s=>!s);setSearchQuery("");}} title="Search tasks"
                style={{background:showSearch?accent+"22":T.card,border:`1.5px solid ${showSearch?accent:T.border}`,color:showSearch?accent:T.muted,cursor:"pointer",display:"flex",padding:"7px",borderRadius:10}}>
                <Icon name="Search" size={16} color={showSearch?accent:T.muted}/>
              </button>
              <button onClick={()=>setWideMode(w=>!w)} title={wideMode?"Compact view":"Wide view"}
                style={{background:wideMode?accent+"22":T.card,border:`1.5px solid ${wideMode?accent:T.border}`,color:wideMode?accent:T.muted,cursor:"pointer",display:"flex",padding:"7px",borderRadius:10}}>
                <Icon name="LayoutDashboard" size={16} color={wideMode?accent:T.muted}/>
              </button>
              <button onClick={()=>setShowSettings(true)} style={{background:T.card,border:`1.5px solid ${T.border}`,color:T.muted,cursor:"pointer",display:"flex",padding:"7px",borderRadius:10}}>
                <Icon name="Settings" size={16}/>
              </button>
            </div>
          </div>

          {/* Storage save-failure toast */}
          {storageError&&(
            <div style={{padding:"8px 16px",background:"#fef2f2",borderBottom:"1px solid #fca5a5",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
              <Icon name="AlertCircle" size={14} color="#dc2626"/>
              <span style={{fontSize:12,color:"#dc2626",fontFamily:"'Nunito Sans',sans-serif"}}>Couldn't save your last change — device storage may be full.</span>
            </div>
          )}

          {/* Search bar */}
          {showSearch&&(
            <div style={{padding:"8px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
              <input autoFocus value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                onKeyDown={e=>e.key==="Escape"&&(setShowSearch(false),setSearchQuery(""))}
                style={{width:"100%",background:T.card,color:T.text,borderRadius:12,padding:"10px 14px",fontSize:14,border:`1.5px solid ${accent}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"}}
                placeholder="Search tasks…"/>
              {searchQuery&&(
                <div style={{marginTop:8,maxHeight:300,overflowY:"auto"}}>
                  {tasks.filter(t=>t.title?.toLowerCase().includes(searchQuery.toLowerCase())||t.notes?.toLowerCase().includes(searchQuery.toLowerCase())).slice(0,20).map(t=>{
                    const cat=categories.find(c=>c.id===t.category);
                    return(
                      <div key={t.id} onClick={()=>{setEditTask(t);setShowSearch(false);setSearchQuery("");}}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,cursor:"pointer",marginBottom:4,background:T.card,border:`1px solid ${T.border}`}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor=accent}
                        onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:cat?.color||accent,flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:T.text,fontFamily:"'Nunito',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                          <div style={{fontSize:11,color:T.muted,fontFamily:"'Nunito Sans',sans-serif",display:"flex",gap:6}}>
                            <span style={{color:PRIORITY_COLORS[t.priority]}}>{t.priority}</span>
                            {t.scheduledDate&&<span>📅 {formatDate(t.scheduledDate)}</span>}
                            {t.status==="Done"&&<span style={{color:"#4ade80"}}>✓ Done</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {tasks.filter(t=>t.title?.toLowerCase().includes(searchQuery.toLowerCase())||t.notes?.toLowerCase().includes(searchQuery.toLowerCase())).length===0&&
                    <div style={{textAlign:"center",color:T.muted,padding:"16px",fontSize:13,fontFamily:"'Nunito',sans-serif"}}>No tasks found</div>}
                </div>
              )}
            </div>
          )}
          {/* Content */}
          <div style={{flex:1,overflow:"hidden",background:T.bg}}>
            {tab==="goals"&&<GoalsTab goals={goals} onGoalsChange={setGoals} tasks={tasks} onAddTask={addTask} onEditTask={setEditTask} categories={categories} defaultCat={defaultCat}/>}
            {tab==="today"&&<TodayTab goals={goals} tasks={tasks} categories={categories} onEdit={setEditTask} onStatusChange={(id,s)=>{updateTask(id,{status:s,completedAt:s==="Done"?new Date().toISOString():""})}} onGoToDay={(t)=>{if(t==="list")setTab("list");else{setDayTarget(todayStr());setTab("day");}}} onGoToGoals={()=>setTab("goals")} onSpin={()=>setShowWheel(true)} onFocus={t=>{updateTask(t.id,{status:"In Progress"});setFocusTask(t);}} onAddTask={addTask} onPlanDay={()=>setShowPlanDay(true)}/>}
            {tab==="list"&&<ListTab tasks={tasks} categories={categories} onEdit={setEditTask} doneVis={doneVis} defaultCat={defaultCat} savedFilters={savedFilters} onSaveFilters={setSavedFilters} onStatusChange={(id,s)=>{updateTask(id,{status:s,completedAt:s==="Done"?new Date().toISOString():""})}} onAdd={addTask} savedSorts={savedSorts} onSaveSorts={setSavedSorts} onFocus={t=>{updateTask(t.id,{status:"In Progress"});setFocusTask(t);}}/>}
            {tab==="day"&&<DayTab tasks={tasks} categories={categories} onUpdate={updateTask} onEdit={setEditTask} onAdd={addTask} defaultCat={defaultCat} initialDate={dayTarget} dayHours={dayHours} slotMins={slotMins}/>}
            {tab==="week"&&<WeekTab tasks={tasks} categories={categories} onDayClick={handleDayClick} onAdd={addTask} defaultCat={defaultCat}/>}
            {tab==="month"&&<MonthTab tasks={tasks} categories={categories} onDayClick={handleDayClick} onAdd={addTask} defaultCat={defaultCat} onClearSchedule={()=>setTasks(p=>p.map(t=>({...t,scheduledDate:"",scheduledTime:""})))} />}
          </div>

          {/* Bottom Nav */}
          <div style={{display:"flex",borderTop:`1.5px solid ${T.border}`,background:T.navBg,flexShrink:0}}>
            {TABS.map(({id,label,icon})=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"9px 0 8px",gap:3,background:"none",border:"none",color:tab===id?accent:T.muted,cursor:"pointer",fontFamily:"'Nunito',sans-serif",position:"relative"}}>
                {tab===id&&<span style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:999,background:accent}}/>}
                <Icon name={icon} size={17} color={tab===id?accent:T.muted}/>
                <span style={{fontSize:10,fontWeight:tab===id?800:500}}>{label}</span>
              </button>
            ))}
          </div>

          {focusTask&&<FocusMode task={focusTask} onDone={completed=>{updateTask(focusTask.id,{status:completed?"Done":"Not Started"});setFocusTask(null);}} onGiveUp={()=>setFocusTask(null)}/>}
          {showWheel&&<SpinWheel tasks={tasks} categories={categories} onClose={()=>{setShowWheel(false);setWheelWinner(null);}} onResult={id=>{updateTask(id,{status:"In Progress"});setWheelWinner(tasks.find(t=>t.id===id));}} onFocus={w=>{setShowWheel(false);setFocusTask(w||wheelWinner);}} />}
          {editTask&&<TaskModal task={editTask} categories={categories} onSave={handleSave} onDelete={handleDelete} onClose={()=>setEditTask(null)}/>}
          {showPlanDay&&<PlanDayModal tasks={tasks} categories={categories} onAdd={addTask} onUpdate={updateTask} workHours={workHours} onWorkHoursChange={setWorkHours} breakCadence={breakCadence} onBreakCadenceChange={setBreakCadence} defaultCat={defaultCat} onClose={()=>setShowPlanDay(false)}/>}
          {showSettings&&<SettingsPanel categories={categories} onCategoriesChange={setCategories} onDeleteCategory={deleteCategory} tasks={tasks} dayHours={dayHours} onDayHoursChange={setDayHours} slotMins={slotMins} onSlotMinsChange={setSlotMins} doneVis={doneVis} onDoneVisChange={setDoneVis} defaultCat={defaultCat} onDefaultCatChange={setDefaultCat} syncKey={syncKey} onSyncKeyChange={setSyncKey} syncStatus={syncStatus} onPullSync={async()=>{await pushSync();await pullSync();}}
            onImport={imported=>{setTasks(imported);setShowSettings(false);}} onClose={()=>setShowSettings(false)}
            themeId={themeId} isDark={isDark} onThemeChange={setThemeId} onModeChange={setIsDark}/>}
        </div>
      </ThemeCtx.Provider>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
