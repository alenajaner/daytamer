                </div>
                {t.status!=="Done"&&<button onClick={e=>{e.stopPropagation();onFocus(t);}} title="Start focus timer"
                  style={{width:28,height:28,borderRadius:8,background:accent+"18",border:`1.5px solid ${accent}40`,color:accent,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,alignSelf:"center"}}>
                  ▶
                </button>}
              </div>
            );
          })}
          {viewMode==="list"&&sorted.length===0&&sortedPast.length===0&&<div style={{textAlign:"center",color:T.muted,padding:"40px 0",fontSize:14,fontFamily:"'Nunito',sans-serif"}}>No tasks match your filters.</div>}
          {viewMode==="list"&&sorted.length===0&&sortedPast.length>0&&<div style={{textAlign:"center",color:T.muted,padding:"24px 0 8px",fontSize:14,fontFamily:"'Nunito',sans-serif"}}>All caught up! 🎉</div>}
          {/* Past tasks collapsible section */}
          {sortedPast.length>0&&(
            <div style={{marginTop:8}}>
              <button onClick={()=>setShowPast(p=>!p)}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"transparent",border:`1.5px solid ${T.border}`,borderRadius:12,padding:"10px 14px",cursor:"pointer",marginBottom:showPast?10:0}}>
                <span style={{fontSize:12,fontWeight:700,color:T.muted,fontFamily:"'Nunito',sans-serif"}}>Past tasks · {sortedPast.length}</span>
                <Icon name={showPast?"ChevronUp":"ChevronDown"} size={14} color={T.muted}/>
              </button>
              {showPast&&sortedPast.map(t=>{
                const cat=categories.find(c=>c.id===t.category);
                return(
                  <div key={t.id} style={{background:T.card,borderRadius:14,borderLeft:`4px solid ${T.border}`,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10,boxShadow:"0 1px 4px rgba(61,74,92,0.05)",marginBottom:6,opacity:0.65}}>
                    <button onClick={()=>onStatusChange(t.id,"Not Started")} className="tap-target" style={{width:21,height:21,borderRadius:"50%",border:`2.5px solid #4ade80`,background:"#4ade8022",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <Icon name="Check" size={10} color="#4ade80"/>
                    </button>
                    <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onEdit(t)}>
                      <div style={{color:T.muted,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:"line-through",fontFamily:"'Nunito',sans-serif"}}>{t.title}</div>
                      <div style={{fontSize:11,color:T.muted,fontFamily:"'Nunito Sans',sans-serif"}}>{t.completedAt?`Completed ${formatDate(t.completedAt.slice(0,10))}`:"Completed"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Day Planner ───────────────────────────────────────────────────────────────
  // Snap any HH:MM time string to nearest slot increment
  const makeSnap=(inc=15)=>(timeStr)=>{
    if(!timeStr)return timeStr;
    const [h,m]=timeStr.split(":").map(Number);
    const snapped=Math.round((h*60+m)/inc)*inc;
    const sh=Math.floor(snapped/60)%24;
    const sm=snapped%60;
    return `${String(sh).padStart(2,"0")}:${String(sm).padStart(2,"0")}`;
  };
  const snapTo15=makeSnap(15);

  const makeHours=(startH,endH,inc=15)=>{
    const slots=[];
    for(let tm=startH*60;tm<=endH*60;tm+=inc){
      const h=Math.floor(tm/60),m=tm%60;
      const mm=m===0?"00":m===15?"15":m===30?"30":"45";
      slots.push({label:`${h>12?h-12:h===0?12:h}:${mm} ${h<12?"AM":"PM"}`,value:`${String(h).padStart(2,"0")}:${mm}`});
    }
    return slots;
  };

  // Assignee colour palette — distinct colours per person
  const ASSIGNEE_COLORS = ["#F5A442","#7DCFCB","#b79cf5","#fb7185","#4ade80","#60a5fa","#f59e0b","#f472b6"];
  function getAssigneeColor(name, allNames) {
    const idx = allNames.indexOf(name);
    return ASSIGNEE_COLORS[idx % ASSIGNEE_COLORS.length];
  }

  function DayTab({tasks,categories,onUpdate,onEdit,onAdd,defaultCat="personal",initialDate,dayHours,slotMins=15}){
    const {T,accent}=useTheme();
    const [date,setDate]=useState(initialDate||todayStr());
    const [dragging,setDragging]=useState(null);
    const [dragOver,setDragOver]=useState(null);
    const [queueMode,setQueueMode]=useState("unscheduled");
    const [queueCatFilter,setQueueCatFilter]=useState([]); // empty = all cats
    const [splitView,setSplitView]=useState(false);
    const [selectedTask,setSelectedTask]=useState(null);
    const [slotPicker,setSlotPicker]=useState(null);
    const [quickCreate,setQuickCreate]=useState(null); // {date, time}
    const HOURS=makeHours((dayHours||{start:6}).start,(dayHours||{end:22}).end,slotMins);

    // Queue = tasks that need a time slot:
    // 1. No scheduledDate (unscheduled)
    // 2. scheduledDate = today but no time yet
    // 3. dueDate = today but no scheduledDate (added before new Today button)
    // Queue: tasks needing a time — no date at all, OR today's date but no time yet
    const unscheduledTasks=tasks.filter(t=>
      t.status!=="Done" && (
        !t.scheduledDate ||
        (t.scheduledDate===date && !t.scheduledTime)
      )
    );
    const scheduled=tasks.filter(t=>t.scheduledDate===date);

    // Get all unique assignees across ALL tasks (not just today)
    const allAssignees=[...new Set(tasks.map(t=>t.assignedTo||"Me"))].sort();
    const multiPerson=allAssignees.length>1;

    const queueTasksBase=queueMode==="unscheduled"
      ? unscheduledTasks
      : tasks.filter(t=>t.scheduledDate&&t.status!=="Done");
    const queueTasks=queueCatFilter.length
      ? queueTasksBase.filter(t=>queueCatFilter.includes(t.category))
      : queueTasksBase;
    const totalPlanned=scheduled.reduce((s,t)=>s+(t.estMinutes||0),0);
    const pct=Math.min(100,(totalPlanned/(16*60))*100);
    const getTaskAtSlot=(slot,person=null)=>scheduled.find(t=>snapToSlot(t.scheduledTime)===slot&&(person===null||( t.assignedTo||"Me")===person));
    const snapToSlot=makeSnap(slotMins);
    const getTaskSpan=t=>Math.max(1,Math.ceil((t.estMinutes||slotMins)/slotMins));

    // Occupied slots per person (for split) or combined
    const getOccupied=(person=null)=>{
      const set=new Set();
      const src=person?scheduled.filter(t=>(t.assignedTo||"Me")===person):scheduled;
      src.forEach(t=>{const idx=HOURS.findIndex(h=>h.value===snapToSlot(t.scheduledTime));const span=getTaskSpan(t);for(let i=0;i<span;i++)if(idx>=0)set.add(idx+i);});
      return set;
    };
    const occupiedSlots=getOccupied();

    const prevDay=()=>{const d=new Date(date+"T00:00:00");d.setDate(d.getDate()-1);setDate(d.toISOString().slice(0,10));};
    const nextDay=()=>{const d=new Date(date+"T00:00:00");d.setDate(d.getDate()+1);setDate(d.toISOString().slice(0,10));};

    const handleQueueTap=(t)=>{
      if(selectedTask?.id===t.id){setSelectedTask(null);}
      else{setSelectedTask(t);setSlotPicker(null);}
    };
    const handleSlotTap=(slotValue,isOccupied)=>{
      if(selectedTask){
        // Moving a task — allow dropping on any slot, even occupied (overlap columns handle it)
        // But not on the task's own slot
        if(snapToSlot(selectedTask.scheduledTime)===slotValue&&selectedTask.scheduledDate===date){
          setSelectedTask(null); // tapped same slot = deselect
        } else {
          onUpdate(selectedTask.id,{scheduledDate:date,scheduledTime:slotValue});
          setSelectedTask(null);
        }
        return;
      }
      if(isOccupied)return;
      setSlotPicker(slotValue===slotPicker?null:slotValue);
    };
    const handleSlotLongPress=(slotValue)=>{
      setQuickCreate({date,time:slotValue});
      setSlotPicker(null);
    };
    const assignToSlot=(taskId,slotValue)=>{
      onUpdate(taskId,{scheduledDate:date,scheduledTime:slotValue});
      setSlotPicker(null);
    };

    // Tasks scheduled for this day with no time — shown at top
    const allDayTasks=scheduled.filter(t=>!t.scheduledTime);

    // ── Single timeline column ────────────────────────────────────────────────
    const SLOT_H = slotMins===60?84:slotMins===30?42:28; // px per slot
    const SingleTimeline = () => {
      const totalH = HOURS.length * SLOT_H;
      return (
      <div style={{flex:1,overflowY:"auto",position:"relative"}}>

        {/* Grid — fixed height rows, time labels only */}
        <div style={{position:"relative",height:`${totalH}px`}}>
          {HOURS.map((h,idx)=>{
            const isTapTarget=selectedTask&&!occupiedSlots.has(idx)&&!getTaskAtSlot(h.value);
            const isSlotOpen=slotPicker===h.value;
            return(
              <div key={h.value}
                onDragOver={e=>{if(!occupiedSlots.has(idx)){e.preventDefault();setDragOver(h.value);}}}
                onDragLeave={()=>setDragOver(null)}
                onDrop={()=>{if(!occupiedSlots.has(idx)&&dragging){onUpdate(dragging.id,{scheduledDate:date,scheduledTime:h.value});setDragging(null);setDragOver(null);}}}
                onClick={()=>handleSlotTap(h.value,occupiedSlots.has(idx)&&!getTaskAtSlot(h.value))}
                style={{position:"absolute",top:`${idx*SLOT_H}px`,left:0,right:0,height:`${SLOT_H}px`,display:"flex",alignItems:"flex-start",borderBottom:`1px solid ${T.border}20`,background:isSlotOpen?accent+"25":dragOver===h.value||(selectedTask&&!isTapTarget)?accent+"08":isTapTarget?accent+"12":"transparent",boxSizing:"border-box",cursor:selectedTask?"crosshair":isTapTarget?"pointer":"default"}}>
                <div style={{width:62,flexShrink:0,fontSize:9,color:isTapTarget?accent:T.muted,paddingTop:6,paddingRight:6,textAlign:"right",fontFamily:"'Nunito',sans-serif",fontWeight:isTapTarget?700:400,lineHeight:1}}>{h.label}</div>
                {(isTapTarget||selectedTask)&&<span style={{fontSize:9,color:accent,fontWeight:700,fontFamily:"'Nunito',sans-serif",opacity:0.7,paddingTop:8}}>{isTapTarget?"+ assign here":"→ move here"}</span>}
                {isSlotOpen&&(
                  <div style={{position:"absolute",left:62,right:8,top:0,zIndex:20,background:T.surface,border:`1.5px solid ${accent}`,borderRadius:12,boxShadow:"0 8px 24px rgba(61,74,92,0.18)",padding:6,maxHeight:180,overflowY:"auto"}} className="hide-scrollbar">
                    <div style={{fontSize:10,color:accent,fontWeight:700,padding:"4px 8px 6px",fontFamily:"'Nunito',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>Assign to {h.label}</div>
                    <div onClick={e=>{e.stopPropagation();setQuickCreate({date,time:h.value});setSlotPicker(null);}}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:8,cursor:"pointer",marginBottom:4,background:accent+"12"}}
                      onMouseEnter={e=>e.currentTarget.style.background=accent+"22"}
                      onMouseLeave={e=>e.currentTarget.style.background=accent+"12"}>
                      <Icon name="Plus" size={13} color={accent}/>
                      <span style={{fontSize:12,color:accent,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>New task at {h.label}</span>
                    </div>
                    <div style={{borderBottom:`1px solid ${T.border}`,marginBottom:4}}/>
                    {unscheduledTasks.length===0
                      ?<div style={{fontSize:12,color:T.muted,padding:"8px",textAlign:"center",fontFamily:"'Nunito',sans-serif"}}>No unscheduled tasks</div>
                      :unscheduledTasks.map(t=>{
                        const cat=categories.find(c=>c.id===t.category);
                        return(
                          <div key={t.id} onClick={e=>{e.stopPropagation();assignToSlot(t.id,h.value);}}
                            style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:8,cursor:"pointer"}}
                            onMouseEnter={e=>e.currentTarget.style.background=accent+"15"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <span style={{background:cat?.color||accent,width:8,height:8,borderRadius:"50%",flexShrink:0}}/>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,color:T.text,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif"}}>{t.title}</div>
                              <div style={{fontSize:10,color:PRIORITY_COLORS[t.priority],fontFamily:"'Nunito',sans-serif"}}>{t.priority} · {fmtMins(t.estMinutes)}</div>
                            </div>
                          </div>
                        );
                      })
                    }
                    <button onClick={e=>{e.stopPropagation();setSlotPicker(null);}} style={{width:"100%",marginTop:4,padding:"6px",background:"transparent",border:"none",color:T.muted,fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Cancel</button>
                  </div>
                )}
              </div>
            );
          })}
          {/* Task blocks — absolutely positioned, collision-aware columns */}
          {(()=>{
            const timedTasks=scheduled.filter(t=>t.scheduledTime).map(t=>({
              ...t,
              _idx:HOURS.findIndex(h=>h.value===snapToSlot(t.scheduledTime)),
              _span:getTaskSpan(t),
            })).filter(t=>t._idx>=0);

            // Assign column slots to overlapping tasks
            // Two tasks overlap if their slot ranges intersect
            const cols=[]; // cols[i] = array of tasks in that column
            timedTasks.forEach(t=>{
              const end=t._idx+t._span;
              let placed=false;
              for(let c=0;c<cols.length;c++){
                const conflict=cols[c].some(o=>{
                  const oEnd=o._idx+o._span;
                  return t._idx<oEnd && end>o._idx;
                });
                if(!conflict){cols[c].push(t);placed=true;break;}
              }
              if(!placed)cols.push([t]);
            });
            const totalCols=cols.length||1;
            // Build task→col map
            const taskCol={};
            cols.forEach((col,ci)=>col.forEach(t=>taskCol[t.id]=ci));

            return timedTasks.map(t=>{
              const cat=categories.find(c=>c.id===t.category);
              const aColor=getAssigneeColor(t.assignedTo||"Me",allAssignees);
              const blockH=t._span*SLOT_H-4;
              const ci=taskCol[t.id]||0;
              const colW=`calc((100% - 66px - 8px) / ${totalCols})`;
              const colLeft=`calc(66px + ${ci} * (100% - 66px - 8px) / ${totalCols})`;
              return(
                <div key={t.id}
                  draggable
                  onDragStart={()=>{setDragging(t);}}
                  onDragEnd={()=>setDragging(null)}
                  onClick={e=>{
                    e.stopPropagation();
                    if(selectedTask?.id===t.id){onEdit(t);setSelectedTask(null);}  // second tap = edit
                    else{setSelectedTask(t);setSlotPicker(null);}                   // first tap = select to move
                  }}
                  style={{position:"absolute",top:`${t._idx*SLOT_H+2}px`,left:colLeft,width:colW,height:`${blockH}px`,background:selectedTask?.id===t.id?(cat?.color||accent)+"40":(cat?.color||accent)+"18",border:`2px solid ${selectedTask?.id===t.id?(cat?.color||accent):(cat?.color||accent)+"60"}`,borderRadius:10,padding:"4px 8px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4,cursor:"pointer",zIndex:selectedTask?.id===t.id?8:5,overflow:"hidden",boxSizing:"border-box",boxShadow:selectedTask?.id===t.id?`0 0 0 3px ${(cat?.color||accent)}40`:"none",transition:"all 0.15s"}}
                  title={selectedTask?.id===t.id?"Tap slot to move · Tap again to edit":"Tap to move · Tap again to edit"}>
                  <button onClick={e=>{e.stopPropagation();onUpdate(t.id,{status:t.status==="Done"?"Not Started":"Done",completedAt:t.status==="Done"?"":new Date().toISOString()});}}
                    style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${t.status==="Done"?"#4ade80":((cat?.color||accent)+"80")}`,background:t.status==="Done"?"#4ade8022":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0,marginTop:2}}>
                    {t.status==="Done"&&<Icon name="Check" size={8} color="#4ade80"/>}
                  </button>
                  <div style={{flex:1,minWidth:0,opacity:t.status==="Done"?0.5:1}}>
                    <div style={{fontSize:12,color:t.status==="Done"?T.muted:T.text,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif",textDecoration:t.status==="Done"?"line-through":"none"}}>{t.title}</div>
                    <div style={{fontSize:10,color:T.muted,display:"flex",alignItems:"center",gap:4}}>
                      {t.status!=="Done"&&fmtMins(t.estMinutes)}
                      {t.assignedTo&&t.assignedTo!=="Me"&&<span style={{color:aColor,fontWeight:700}}>· {t.assignedTo}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                    <button onClick={e=>{e.stopPropagation();onEdit(t);}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:0}}><Icon name="Pencil" size={10}/></button>
                    <button onClick={e=>{e.stopPropagation();onUpdate(t.id,{scheduledDate:"",scheduledTime:""}); }} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:0}}><Icon name="X" size={11}/></button>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      </div>
      );
    };

    // ── Split timeline — one column per person ────────────────────────────────
    const SplitTimeline = () => {
      const personsOccupied = Object.fromEntries(allAssignees.map(p=>[p,getOccupied(p)]));
      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Person header row */}
          <div style={{display:"flex",borderBottom:`2px solid ${T.border}`,flexShrink:0}}>
            <div style={{width:54,flexShrink:0}}/>
            {allAssignees.map(p=>{
              const color=getAssigneeColor(p,allAssignees);
              const personTasks=scheduled.filter(t=>(t.assignedTo||"Me")===p);
              const mins=personTasks.reduce((s,t)=>s+(t.estMinutes||0),0);
              return(
                <div key={p} style={{flex:1,textAlign:"center",padding:"6px 4px",borderLeft:`1px solid ${T.border}`}}>
                  <div style={{fontSize:11,fontWeight:800,color:color,fontFamily:"'Nunito',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                  <div style={{fontSize:9,color:T.muted,fontFamily:"'Nunito',sans-serif"}}>{Math.round(mins/60*10)/10}h</div>
                </div>
              );
            })}
          </div>
          {/* Scrollable rows */}
          <div style={{flex:1,overflowY:"auto"}}>
            {HOURS.map((h,idx)=>(
              <div key={h.value} style={{display:"flex",borderBottom:`1px solid ${T.border}20`,minHeight:28}}>
                {/* Time label */}
                <div style={{width:54,flexShrink:0,fontSize:9,color:T.muted,padding:"13px 4px 0",textAlign:"right",fontFamily:"'Nunito',sans-serif"}}>{h.label}</div>
                {/* Per-person columns */}
                {allAssignees.map(p=>{
                  const task=getTaskAtSlot(h.value,p);
                  const occ=personsOccupied[p].has(idx)&&!task;
                  const color=getAssigneeColor(p,allAssignees);
                  const span=task?getTaskSpan(task):1;
                  return(
                    <div key={p} style={{flex:1,borderLeft:`1px solid ${T.border}20`,padding:"2px 3px",position:"relative",background:task?color+"08":"transparent"}}>
                      {task&&!occ&&(()=>(
                        <div onClick={()=>onEdit(task)}
                          style={{background:color+"22",border:`1.5px solid ${color}60`,borderRadius:8,padding:"3px 5px",minHeight:`${span*28-4}px`,cursor:"pointer",position:"relative"}}>
                          <div style={{fontSize:10,color:T.text,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif",lineHeight:1.3}}>{task.title}</div>
                          <div style={{fontSize:9,color:color,fontWeight:600,fontFamily:"'Nunito',sans-serif"}}>{fmtMins(task.estMinutes)}</div>
                          <button onClick={e=>{e.stopPropagation();onUpdate(task.id,{scheduledDate:"",scheduledTime:""}); }} style={{position:"absolute",top:2,right:2,background:"none",border:"none",color:T.muted,cursor:"pointer",padding:0,display:"flex"}}><Icon name="X" size={9}/></button>
                        </div>
                      ))()}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      );
    };

    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}} onClick={e=>{if(e.target===e.currentTarget){setSelectedTask(null);setSlotPicker(null);}}}>
        {/* Header */}
        <div style={{padding:"10px 16px 8px",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <button onClick={prevDay} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="ChevronLeft" size={18}/></button>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:"transparent",color:T.text,border:"none",outline:"none",fontSize:14,fontWeight:800,textAlign:"center",fontFamily:"'Nunito',sans-serif",cursor:"pointer"}}/>
            <button onClick={nextDay} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="ChevronRight" size={18}/></button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:multiPerson?8:0}}>
            <div style={{flex:1,height:6,background:T.subtle,borderRadius:999,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:pct>85?"#ef4444":`linear-gradient(90deg,${accent},#F0C070)`,borderRadius:999,transition:"width 0.3s"}}/>
            </div>
            <span style={{fontSize:11,color:T.muted,whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif"}}>{Math.round(totalPlanned/60*10)/10}h / 16h</span>
          </div>
          {/* Split toggle — only shown when multiple people exist */}
          {multiPerson&&(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:`1.5px solid ${T.border}`,flexShrink:0}}>
                <button onClick={()=>setSplitView(false)}
                  style={{padding:"4px 10px",background:!splitView?accent+"22":"transparent",color:!splitView?accent:T.muted,border:"none",borderRight:`1px solid ${T.border}`,fontSize:10,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>
                  All
                </button>
                <button onClick={()=>setSplitView(true)}
                  style={{padding:"4px 10px",background:splitView?accent+"22":"transparent",color:splitView?accent:T.muted,border:"none",fontSize:10,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>
                  By person
                </button>
              </div>
              {/* Assignee colour legend */}
              <div style={{display:"flex",gap:6,overflowX:"auto",alignItems:"center"}} className="hide-scrollbar">
                {allAssignees.map(p=>(
                  <span key={p} style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:getAssigneeColor(p,allAssignees),display:"inline-block"}}/>
                    <span style={{fontSize:10,color:T.muted,fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>{p}</span>
                  </span>
                ))}
              </div>
            </div>
          )}
          {selectedTask&&(
            <div style={{marginTop:8,background:accent+"18",border:`1.5px solid ${accent}40`,borderRadius:10,padding:"7px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:accent,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{selectedTask.scheduledTime?"✋ Tap a slot to move":"✨ Tap a slot to schedule"} "{selectedTask.title}"</span>
              <button onClick={()=>setSelectedTask(null)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:0,marginLeft:8}}><Icon name="X" size={14}/></button>
            </div>
          )}
        </div>

        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {/* Queue sidebar — hidden in split view to save space */}
          {!splitView&&(
            <div style={{width:116,flexShrink:0,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column"}}>
              <div style={{display:"flex",gap:4,padding:"6px",borderBottom:`1px solid ${T.border}`}}>
                {[{id:"unscheduled",label:"To place"},{id:"scheduled",label:"Placed"}].map(m=>(
                  <button key={m.id} onClick={()=>setQueueMode(m.id)}
                    style={{flex:1,padding:"4px 2px",borderRadius:7,border:`1.5px solid ${queueMode===m.id?accent:T.border}`,background:queueMode===m.id?accent+"18":T.card,color:queueMode===m.id?accent:T.muted,fontSize:9,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700,whiteSpace:"nowrap"}}>
                    {m.label}
                  </button>
                ))}
              </div>
              {/* Category filter chips */}
              <div style={{display:"flex",gap:4,padding:"4px 6px",flexWrap:"wrap",borderBottom:`1px solid ${T.border}`}}>
                {categories.map(c=>{
                  const active=queueCatFilter.includes(c.id);
                  return(
                    <button key={c.id} onClick={()=>setQueueCatFilter(p=>p.includes(c.id)?p.filter(x=>x!==c.id):[...p,c.id])}
                      style={{padding:"2px 7px",borderRadius:999,border:`1.5px solid ${active?c.color:T.border}`,background:active?c.color+"22":"transparent",color:active?c.color:T.muted,fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:3}}>
                      <span style={{width:5,height:5,borderRadius:"50%",background:c.color,display:"inline-block"}}/>
                      {c.name}
                    </button>
                  );
                })}
                {queueCatFilter.length>0&&<button onClick={()=>setQueueCatFilter([])} style={{padding:"2px 6px",borderRadius:999,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontSize:9,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Clear</button>}
              </div>
              <div style={{flex:1,overflowY:"auto",padding:"6px",display:"flex",flexDirection:"column",gap:5}} className="hide-scrollbar">
                {queueTasks.map(t=>{
                  const cat=categories.find(c=>c.id===t.category);
                  const isSel=selectedTask?.id===t.id;
                  const aColor=getAssigneeColor(t.assignedTo||"Me",allAssignees);
                  return(
                    <div key={t.id}
                      draggable
                      onDragStart={()=>{setDragging(t);setSelectedTask(null);}}
                      onDragEnd={()=>setDragging(null)}
                      onClick={()=>handleQueueTap(t)}
                      style={{background:isSel?accent+"22":T.card,borderRadius:10,borderLeft:`3px solid ${isSel?accent:cat?.color||accent}`,border:isSel?`2px solid ${accent}`:undefined,padding:"6px 8px",cursor:"pointer",boxShadow:isSel?`0 0 0 2px ${accent}40`:"0 1px 3px rgba(61,74,92,0.08)",transition:"all 0.15s"}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:4}}>
                        <div style={{fontSize:11,color:T.text,marginBottom:2,fontWeight:700,fontFamily:"'Nunito',sans-serif",lineHeight:1.3,flex:1,wordBreak:"break-word"}} title={t.title}>{t.title}</div>
                        <button onClick={e=>{e.stopPropagation();onEdit(t);}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",padding:0,flexShrink:0,display:"flex",marginTop:1}}>
                          <Icon name="Pencil" size={10}/>
                        </button>
                      </div>
                      <div style={{fontSize:9,color:isSel?accent:T.muted,fontFamily:"'Nunito',sans-serif",fontWeight:600,display:"flex",gap:3,flexWrap:"wrap"}}>
                        {isSel?<span style={{color:accent}}>Tap slot →</span>:<><span style={{color:PRIORITY_COLORS[t.priority]}}>{t.priority}</span><span>·</span><span>{fmtMins(t.estMinutes)}</span>{cat&&<span style={{color:cat.color}}>· {cat.name}</span>}</>}
                      </div>

                      {multiPerson&&(t.assignedTo&&t.assignedTo!=="Me")&&<div style={{fontSize:9,color:aColor,marginTop:2,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{t.assignedTo}</div>}
                      {t.scheduledDate&&!isSel&&<div style={{fontSize:9,color:t.scheduledDate===date?"#4ade80":"#7DCFCB",marginTop:2,fontFamily:"'Nunito',sans-serif"}}>{t.scheduledDate===date?"Today":formatDate(t.scheduledDate)}{t.scheduledTime&&` · ${formatTime(t.scheduledTime)}`}</div>}
                    </div>
                  );
                })}
                {queueTasks.length===0&&<div style={{fontSize:10,color:T.muted,textAlign:"center",paddingTop:16,lineHeight:1.6,fontFamily:"'Nunito',sans-serif"}}>{queueMode==="unscheduled"?"All tasks placed ✓":"No placed tasks"}</div>}
              </div>
            </div>
          )}

          {splitView ? <SplitTimeline/> : <SingleTimeline/>}
        </div>
        {/* Floating + button */}
        <button onClick={()=>setQuickCreate({date,time:""})}
          style={{position:"absolute",bottom:16,right:16,width:48,height:48,borderRadius:"50%",background:accent,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${accent}60`,zIndex:10}}>
          <Icon name="Plus" size={22}/>
        </button>
        {quickCreate&&<QuickCreateModal
          defaultDate={quickCreate.date} defaultTime={quickCreate.time}
          categories={categories} accent={accent} defaultCat={defaultCat}
          onSave={t=>{onAdd(t);setQuickCreate(null);}}
          onClose={()=>setQuickCreate(null)}/>}
      </div>
    );
  }


  // ── Week Tab ──────────────────────────────────────────────────────────────────
  function WeekTab({tasks,categories,onDayClick,onAdd,defaultCat="personal"}){
    const {T,accent}=useTheme();
    const [anchor,setAnchor]=useState(todayStr());
    const [quickCreate,setQuickCreate]=useState(null);
    const [showQueue,setShowQueue]=useState(false);
    const [queueTab,setQueueTab]=useState("unscheduled"); // unscheduled | scheduled
    const days=weekDates(anchor),today=todayStr();
    const unscheduled=tasks.filter(t=>!t.scheduledDate&&t.status!=="Done");
    const scheduled=tasks.filter(t=>t.scheduledDate&&t.status!=="Done").sort((a,b)=>a.scheduledDate>b.scheduledDate?1:-1);
    const queueTasks=queueTab==="unscheduled"?unscheduled:scheduled;
    const DAY_LABELS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
          <button onClick={()=>{const d=new Date(days[0]+"T00:00:00");d.setDate(d.getDate()-7);setAnchor(d.toISOString().slice(0,10));}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="ChevronLeft" size={18}/></button>
          <span style={{fontSize:14,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif"}}>{formatDate(days[0])} – {formatDate(days[6])}</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>setShowQueue(q=>!q)}
              style={{background:showQueue?accent+"22":"transparent",border:`1.5px solid ${showQueue?accent:T.border}`,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:showQueue?accent:T.muted,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4}}>
              <Icon name="List" size={12} color={showQueue?accent:T.muted}/>
              Queue{unscheduled.length>0&&<span style={{background:accent,color:"#fff",borderRadius:999,fontSize:9,padding:"1px 5px",marginLeft:2}}>{unscheduled.length}</span>}

            </button>
            <button onClick={()=>{const d=new Date(days[0]+"T00:00:00");d.setDate(d.getDate()+7);setAnchor(d.toISOString().slice(0,10));}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="ChevronRight" size={18}/></button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:`1px solid ${T.border}`}}>
          {days.map((d,i)=>(
            <div key={d} style={{textAlign:"center",padding:"8px 0"}}>
              <div style={{fontSize:10,color:T.muted,fontFamily:"'Nunito',sans-serif",fontWeight:600}}>{DAY_LABELS[i]}</div>
              <div style={{fontSize:14,fontWeight:800,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",margin:"2px auto 0",background:d===today?accent:"transparent",color:d===today?"white":T.text,fontFamily:"'Nunito',sans-serif"}}>{new Date(d+"T00:00:00").getDate()}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {showQueue&&(
          <div style={{width:160,flexShrink:0,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",background:T.surface}}>
            {/* Tabs */}
            <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
              {[{id:"unscheduled",label:"Queue",count:unscheduled.length},{id:"scheduled",label:"Sched'd",count:scheduled.length}].map(tab=>(
                <button key={tab.id} onClick={()=>setQueueTab(tab.id)}
                  style={{flex:1,padding:"6px 2px",background:queueTab===tab.id?accent+"18":"transparent",border:"none",borderBottom:queueTab===tab.id?`2px solid ${accent}`:"2px solid transparent",color:queueTab===tab.id?accent:T.muted,fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                  {tab.label}{tab.count>0&&<span style={{marginLeft:2,background:queueTab===tab.id?accent:T.muted,color:"#fff",borderRadius:999,fontSize:8,padding:"0 4px"}}>{tab.count}</span>}
                </button>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"6px"}}>
              {queueTasks.length===0&&<div style={{fontSize:10,color:T.muted,textAlign:"center",paddingTop:16,fontFamily:"'Nunito',sans-serif"}}>{queueTab==="unscheduled"?"All clear ✓":"Nothing scheduled"}</div>}
              {queueTasks.map(t=>{
                const cat=categories.find(c=>c.id===t.category);
                return(
                  <div key={t.id} onClick={()=>setQuickCreate(t.scheduledDate||today)}
                    style={{background:T.card,borderRadius:8,borderLeft:`3px solid ${cat?.color||accent}`,padding:"5px 7px",marginBottom:5,cursor:"pointer"}}>
                    <div style={{fontSize:10,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif"}}>{t.title}</div>
                    <div style={{fontSize:9,color:PRIORITY_COLORS[t.priority],fontFamily:"'Nunito',sans-serif",fontWeight:600}}>{t.priority} · {fmtMins(t.estMinutes)}</div>
                    {queueTab==="scheduled"&&t.scheduledDate&&<div style={{fontSize:9,color:"#7DCFCB",fontFamily:"'Nunito',sans-serif",marginTop:1}}>{formatDate(t.scheduledDate)}{t.scheduledTime&&" "+formatTime(t.scheduledTime)}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",flex:1,overflowY:"auto",borderLeft:`1px solid ${T.border}`}}>
          {days.map(d=>{
            const allDay=tasks.filter(t=>t.scheduledDate===d&&!t.scheduledTime||(t.dueDate===d&&!t.scheduledDate));
            const timed=tasks.filter(t=>t.scheduledDate===d&&t.scheduledTime).sort((a,b)=>a.scheduledTime>b.scheduledTime?1:-1);
            return(
              <div key={d} style={{borderRight:`1px solid ${T.border}`,borderBottom:`1px solid ${T.border}`,minHeight:90,display:"flex",flexDirection:"column",position:"relative"}}>
                {/* Day click header area */}
                <div onClick={()=>onDayClick(d)} style={{flex:1,cursor:"pointer",display:"flex",flexDirection:"column"}}>
                {/* All-day tasks at top */}
                {allDay.length>0&&(
                  <div style={{borderBottom:allDay.length>0&&timed.length>0?`1px solid ${T.border}30`:"none",padding:"3px 2px 2px"}}>
                    {allDay.slice(0,2).map(t=>{
                      const cat=categories.find(c=>c.id===t.category);
                      return<div key={t.id} style={{background:(cat?.color||accent)+"20",borderRadius:3,fontSize:9,padding:"1px 4px",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text,fontFamily:"'Nunito',sans-serif",fontWeight:600}}>{t.title}</div>;
                    })}
                    {allDay.length>2&&<div style={{fontSize:9,color:T.muted,padding:"0 3px",fontFamily:"'Nunito',sans-serif"}}>+{allDay.length-2}</div>}
                  </div>
                )}
                {/* Timed tasks */}
                <div style={{flex:1,padding:"2px 2px"}}>
                  {timed.slice(0,3).map(t=>{
                    const cat=categories.find(c=>c.id===t.category);
                    return(
                      <div key={t.id} style={{border:`1px solid ${cat?.color||accent}80`,borderLeft:`3px solid ${cat?.color||accent}`,borderRadius:3,fontSize:9,padding:"1px 3px",marginBottom:2,overflow:"hidden",color:T.text,fontFamily:"'Nunito',sans-serif"}}>
                        <div style={{color:accent,fontWeight:700,fontSize:9,lineHeight:1.2}}>{formatTime(t.scheduledTime)}</div>
                        <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                      </div>
                    );
                  })}
                  {timed.length>3&&<div style={{fontSize:9,color:T.muted,padding:"0 2px",fontFamily:"'Nunito',sans-serif"}}>+{timed.length-3}</div>}
                </div>
                </div>
                {/* + button */}
                <button onClick={e=>{e.stopPropagation();setQuickCreate(d);}}
                  style={{position:"absolute",bottom:3,right:3,width:18,height:18,borderRadius:"50%",background:accent+"22",border:`1px solid ${accent}40`,color:accent,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,fontSize:12,lineHeight:1}}>
                  +
                </button>
              </div>
            );
          })}
        </div>

        {quickCreate&&<QuickCreateModal
          defaultDate={quickCreate} defaultTime=""
          categories={categories} accent={accent} defaultCat={defaultCat}
          onSave={t=>{onAdd(t);setQuickCreate(null);}}
          onClose={()=>setQuickCreate(null)}/>}
        </div>{/* end queue flex row */}
      </div>
    );
  }

  // ── Month Tab ─────────────────────────────────────────────────────────────────
  function MonthTab({tasks,categories,onDayClick,onClearSchedule,onAdd,defaultCat="personal"}){
    const {T,accent}=useTheme();
    const now=new Date();
    const [year,setYear]=useState(now.getFullYear());
    const [month,setMonth]=useState(now.getMonth());
    const [selected,setSelected]=useState(null);
    const [expanded,setExpanded]=useState(false);
    const [confirmClear,setConfirmClear]=useState(false);
    const [quickCreate,setQuickCreate]=useState(null);
    const today=todayStr();
    const days=monthDates(year,month);
    const prev=()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
    const next=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};
    const dayTasks=d=>tasks.filter(t=>t.scheduledDate===d||(t.dueDate===d&&!t.scheduledDate));
    const selTasks=selected?dayTasks(selected):[];
    const cellH=expanded?80:52;
    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
          <button onClick={prev} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="ChevronLeft" size={18}/></button>
          <span style={{fontSize:14,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif"}}>{MONTH_NAMES[month]} {year}</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setExpanded(!expanded)}
              style={{background:expanded?accent+"18":"transparent",border:`1.5px solid ${expanded?accent:T.border}`,color:expanded?accent:T.muted,borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>
              {expanded?"Compact":"Expand"}
            </button>
            {!confirmClear
              ? <button onClick={()=>setConfirmClear(true)} title="Clear all scheduled dates"
                  style={{background:"transparent",border:`1.5px solid ${T.border}`,color:T.muted,borderRadius:8,padding:"4px 8px",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:3}}>
                  <Icon name="X" size={11}/> Clear
                </button>
              : <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:T.muted,fontFamily:"'Nunito',sans-serif"}}>Unschedule all?</span>
                  <button onClick={()=>{onClearSchedule();setConfirmClear(false);}} style={{background:"#ef444422",border:"1.5px solid #ef4444",color:"#ef4444",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>Yes</button>
                  <button onClick={()=>setConfirmClear(false)} style={{background:"transparent",border:`1.5px solid ${T.border}`,color:T.muted,borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>No</button>
                </div>
            }
            <button onClick={next} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="ChevronRight" size={18}/></button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"8px 8px 0"}}>
          {["M","T","W","T","F","S","S"].map((h,i)=><div key={i} style={{textAlign:"center",fontSize:11,color:T.muted,paddingBottom:4,fontFamily:"'Nunito',sans-serif",fontWeight:700}}>{h}</div>)}
        </div>
        <div style={{flex:selected?0:1,overflowY:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 4px"}}>
            {days.map((d,i)=>{
              if(!d)return<div key={i} style={{minHeight:cellH}}/>;
              const dt=dayTasks(d),cats=[...new Set(dt.map(t=>t.category))];
              const isToday=d===today,isSel=d===selected;
              return(
                <div key={d}
                  style={{minHeight:cellH,border:`1px solid ${T.border}30`,padding:"3px 2px",background:isSel?accent+"10":"transparent",transition:"background 0.1s",position:"relative"}}>
                  <div onClick={()=>setSelected(d===selected?null:d)} style={{position:"absolute",inset:0,cursor:"pointer"}}/>
                  <div style={{width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",margin:"0 auto 2px",background:isToday?accent:"transparent",color:isToday?"white":T.text,fontSize:12,fontWeight:isToday?800:500,fontFamily:"'Nunito',sans-serif"}}>{new Date(d+"T00:00:00").getDate()}</div>
                  {expanded?(
                    <div>
                      {dt.slice(0,3).map(t=>{
                        const cat=categories.find(c=>c.id===t.category);
                        return<div key={t.id} style={{background:(cat?.color||accent)+"25",borderRadius:3,fontSize:9,padding:"1px 3px",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:T.text,fontFamily:"'Nunito',sans-serif",fontWeight:600,lineHeight:1.4}}>{t.scheduledTime&&<span style={{color:accent,fontWeight:700}}>{formatTime(t.scheduledTime)} </span>}{t.title}</div>;
                      })}
                      {dt.length>3&&<div style={{fontSize:9,color:T.muted,textAlign:"center",fontFamily:"'Nunito',sans-serif"}}>+{dt.length-3}</div>}
                    </div>
                  ):(
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center",marginTop:2}}>
                      {cats.slice(0,3).map(cid=>{const cat=categories.find(c=>c.id===cid);return<span key={cid} style={{background:cat?.color||accent,width:5,height:5,borderRadius:"50%",display:"inline-block"}}/>;}) }
                    </div>
                  )}

                </div>
              );
            })}
          </div>
        </div>
        {/* Floating + button */}
        <button onClick={()=>setQuickCreate(selected||todayStr())}
          style={{position:"absolute",bottom:16,right:16,width:48,height:48,borderRadius:"50%",background:accent,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 16px ${accent}60`,zIndex:10}}>
          <Icon name="Plus" size={22}/>
        </button>
        {selected&&(
          <div style={{flex:1,overflowY:"auto",borderTop:`1px solid ${T.border}`}}>
            {/* Day header — matches day view style */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:14,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif"}}>{formatDate(selected)}</div>
                <span style={{fontSize:11,color:T.muted,fontFamily:"'Nunito Sans',sans-serif"}}>{selTasks.length} task{selTasks.length!==1?"s":""}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>onDayClick(selected)}
                  style={{background:accent+"18",border:`1.5px solid ${accent}40`,color:accent,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                  <Icon name="Calendar" size={11} color={accent}/> Open in Day
                </button>
                <button onClick={()=>setQuickCreate(selected)}
                  style={{background:accent,border:"none",color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4,boxShadow:`0 2px 8px ${accent}40`}}>
                  <Icon name="Plus" size={11}/> Add task
                </button>
                <button onClick={()=>setSelected(null)} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="X" size={14}/></button>
              </div>
            </div>
            <div style={{padding:"10px 16px"}}>
              {selTasks.length>0?selTasks.map(t=>{
                const cat=categories.find(c=>c.id===t.category);
                return<div key={t.id} style={{background:T.card,borderRadius:14,borderLeft:`4px solid ${cat?.color||accent}`,padding:"10px 14px",marginBottom:8,boxShadow:"0 1px 4px rgba(61,74,92,0.07)",cursor:"pointer"}}>
                  <div style={{fontSize:13,color:T.text,fontWeight:700,marginBottom:4,fontFamily:"'Nunito',sans-serif"}}>{t.title}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <PriorityBadge p={t.priority}/>
                    <StatusPill s={t.status}/>
                    {t.scheduledTime&&<span style={{fontSize:11,color:accent,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{formatTime(t.scheduledTime)}</span>}
                    {t.assignedTo&&t.assignedTo!=="Me"&&<AssigneePill name={t.assignedTo} muted={T.muted} accent={accent}/>}
                    <span style={{fontSize:11,color:T.muted,display:"flex",alignItems:"center",gap:2}}><Icon name="Clock" size={10}/>{fmtMins(t.estMinutes)}</span>

              }):<div style={{textAlign:"center",color:T.muted,fontSize:13,paddingTop:20,fontFamily:"'Nunito',sans-serif"}}>No tasks — tap Add task to create one</div>}
            </div>
          </div>
        )}
        {quickCreate&&<QuickCreateModal

          categories={categories} accent={accent} defaultCat={defaultCat}
          onSave={t=>{onAdd(t);setQuickCreate(null);}}
          onClose={()=>setQuickCreate(null)}/>}
      </div>
    );
  }


  // ── Goals Tab ─────────────────────────────────────────────────────────────────
  const GOAL_TIMEFRAMES = [
    {id:"day",   label:"Today",   emoji:"☀️"},
    {id:"week",  label:"This week", emoji:"📅"},
    {id:"month", label:"This month",emoji:"🗓️"},
    {id:"year",  label:"This year", emoji:"🎯"},
    {id:"custom",label:"Custom",   emoji:"⭐"},
  ];

  function GoalModal({goal, onSave, onDelete, onClose, categories, defaultCat}){
    const {T,accent}=useTheme();
    const modalRef = useModalA11y(onClose);
    const blank={id:uid(),title:"",why:"",timeframe:"week",category:defaultCat||"personal",endDate:"",milestones:[],linkedTaskIds:[],createdAt:new Date().toISOString()};
    const [g,setG]=useState(goal||blank);
    const [newMs,setNewMs]=useState("");
    const setF=(k,v)=>setG(p=>({...p,[k]:v}));
    const addMilestone=()=>{
      if(!newMs.trim())return;
      setF("milestones",[...g.milestones,{id:uid(),title:newMs.trim(),done:false}]);
      setNewMs("");
    };
    const toggleMs=(id)=>setF("milestones",g.milestones.map(m=>m.id===id?{...m,done:!m.done}:m));
    const deleteMs=(id)=>setF("milestones",g.milestones.filter(m=>m.id!==id));
    return(
      <div ref={modalRef} role="dialog" aria-modal="true" aria-label={goal?"Edit Goal":"New Goal"} tabIndex={-1} style={{position:"fixed",inset:0,zIndex:50,display:"flex",flexDirection:"column",background:T.bg,outline:"none"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
          <button onClick={onClose} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="X" size={20}/></button>
          <span style={{fontWeight:800,color:T.text,fontSize:15,fontFamily:"'Nunito',sans-serif"}}>{goal?"Edit Goal":"New Goal"}</span>
          <button onClick={()=>onSave(g)} style={{background:accent,color:"#fff",border:"none",borderRadius:10,padding:"7px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Save</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:16}}>
          {/* Title */}
          <input value={g.title} onChange={e=>setF("title",e.target.value)}
            style={{width:"100%",background:T.card,color:T.text,borderRadius:12,padding:"12px 14px",fontSize:16,fontWeight:700,border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito',sans-serif"}}
            placeholder="What do you want to achieve?"/>
          {/* Timeframe */}
          <div>
            <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Timeframe</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {GOAL_TIMEFRAMES.map(tf=>(
                <button key={tf.id} onClick={()=>setF("timeframe",tf.id)}
                  style={{padding:"6px 12px",borderRadius:999,border:`2px solid ${g.timeframe===tf.id?accent:"transparent"}`,background:g.timeframe===tf.id?accent+"22":T.card,color:g.timeframe===tf.id?accent:T.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                  {tf.emoji} {tf.label}
                </button>
              ))}
            </div>
          </div>
          {/* End Date */}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Target date <span style={{fontWeight:400,textTransform:"none",letterSpacing:0}}>(optional)</span></div>
              {g.endDate&&<button onClick={()=>setF("endDate","")} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:11,fontFamily:"'Nunito',sans-serif",padding:0,display:"flex",alignItems:"center",gap:2}}><Icon name="X" size={10}/>Clear</button>}
            </div>
            <input type="date" value={g.endDate||""} onChange={e=>setF("endDate",e.target.value)}
              style={{width:"100%",background:T.card,color:T.text,borderRadius:12,padding:"10px 14px",fontSize:14,border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"}}/>
          </div>
          {/* Default task category */}
          <div>
            <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Default task category</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {categories.map(c=>(
                <button key={c.id} onClick={()=>setF("category",c.id)}
                  style={{padding:"5px 12px",borderRadius:999,border:`2px solid ${g.category===c.id?c.color:"transparent"}`,background:g.category===c.id?c.color+"22":T.card,color:g.category===c.id?c.color:T.muted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:c.color,display:"inline-block",flexShrink:0}}/>
                  {c.name}
                </button>
              ))}
            </div>
          </div>
          {/* Why */}
          <div>
            <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Why does this matter? <span style={{fontWeight:400,textTransform:"none",letterSpacing:0}}>(optional)</span></div>
            <textarea value={g.why||""} onChange={e=>setF("why",e.target.value)}
              style={{width:"100%",background:T.card,color:T.text,borderRadius:12,padding:"10px 14px",fontSize:14,border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif",resize:"none",minHeight:80}}
              placeholder="Your motivation, the deeper reason…"/>
          </div>
          {/* Milestones */}
          <div>
            <div style={{fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>Milestones</div>
            {g.milestones.map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.card,borderRadius:10,marginBottom:6}}>
                <button onClick={()=>toggleMs(m.id)}
                  className="tap-target" style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${m.done?"#4ade80":T.muted}`,background:m.done?"#4ade8022":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                  {m.done&&<Icon name="Check" size={10} color="#4ade80"/>}
                </button>
                <input value={m.title}
                  onChange={e=>setF("milestones",g.milestones.map(x=>x.id===m.id?{...x,title:e.target.value}:x))}
                  style={{flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,color:m.done?T.muted:T.text,fontFamily:"'Nunito',sans-serif",textDecoration:m.done?"line-through":"none",padding:0,minWidth:0}}/>
                <div style={{display:"flex",gap:2,flexShrink:0}}>
                  <button onClick={()=>{const idx=g.milestones.findIndex(x=>x.id===m.id);if(idx>0){const a=[...g.milestones];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];setF("milestones",a);}}}
                    style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:"0 2px"}}><Icon name="ChevronUp" size={12}/></button>
                  <button onClick={()=>{const idx=g.milestones.findIndex(x=>x.id===m.id);if(idx<g.milestones.length-1){const a=[...g.milestones];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];setF("milestones",a);}}}
                    style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:"0 2px"}}><Icon name="ChevronDown" size={12}/></button>
                  <button onClick={()=>deleteMs(m.id)}
                    style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:"0 2px"}}><Icon name="X" size={12}/></button>
                </div>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <input value={newMs} onChange={e=>setNewMs(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addMilestone()}
                style={{flex:1,background:T.card,color:T.text,borderRadius:10,padding:"8px 12px",fontSize:13,border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"}}
                placeholder="Add a milestone…"/>
              <button onClick={addMilestone} style={{background:accent,color:"#fff",border:"none",borderRadius:10,padding:"0 14px",cursor:"pointer",display:"flex",alignItems:"center"}}><Icon name="Plus" size={16}/></button>
            </div>
          </div>
          {/* Delete */}
          {goal&&(
            <button onClick={()=>onDelete(g.id)}
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px",borderRadius:12,border:"1.5px solid #fca5a5",color:"#f87171",background:"transparent",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:700,marginTop:8}}>
              <Icon name="Trash2" size={15} color="#f87171"/> Delete Goal
            </button>
          )}
        </div>
      </div>
    );
  }

  function GoalsTab({goals,onGoalsChange,tasks,onAddTask,onEditTask,categories,defaultCat}){
    const {T,accent}=useTheme();
    const [editGoal,setEditGoal]=useState(null);
    const [showNew,setShowNew]=useState(false);
    const [activeFilter,setActiveFilter]=useState("all");
    const today=todayStr();

    const saveGoal=g=>{
      const updated={...g,updatedAt:new Date().toISOString()};
      onGoalsChange(prev=>prev.find(x=>x.id===updated.id)?prev.map(x=>x.id===updated.id?updated:x):[...prev,updated]);
      setEditGoal(null);setShowNew(false);
    };
    const deleteGoal=id=>{onGoalsChange(prev=>prev.filter(x=>x.id!==id));setEditGoal(null);};
    const toggleMilestone=(goalId,msId)=>{
      const ts=new Date().toISOString();
      onGoalsChange(prev=>prev.map(g=>g.id===goalId?{...g,updatedAt:ts,milestones:g.milestones.map(m=>m.id===msId?{...m,done:!m.done}:m)}:g));
    };
    const [linkingGoal,setLinkingGoal]=useState(null); // goalId being linked
    const [linkSearch,setLinkSearch]=useState("");
    const linkTaskToGoal=(goalId,taskId)=>{
      onGoalsChange(prev=>prev.map(g=>g.id===goalId?{...g,updatedAt:new Date().toISOString(),linkedTaskIds:[...new Set([...(g.linkedTaskIds||[]),taskId])]}:g));
      setLinkingGoal(null);setLinkSearch("");
    };
    const unlinkTask=(goalId,taskId)=>{
      onGoalsChange(prev=>prev.map(g=>g.id===goalId?{...g,updatedAt:new Date().toISOString(),linkedTaskIds:(g.linkedTaskIds||[]).filter(id=>id!==taskId)}:g));
    };
    const milestoneToTask=(goal,ms)=>{
      const t={id:uid(),title:ms.title,notes:`From goal: ${goal.title}`,category:goal.category||defaultCat||"personal",priority:"Med",sequence:tasks.length+1,dueDate:"",estMinutes:30,status:"Not Started",assignedTo:"Me",scheduledDate:"",scheduledTime:"",createdAt:new Date().toISOString(),goalId:goal.id};
      onAddTask(t);
      // Mark milestone as linked
      onGoalsChange(prev=>prev.map(g=>g.id===goal.id?{...g,milestones:g.milestones.map(m=>m.id===ms.id?{...m,taskId:t.id}:m)}:g));
    };

    const filtered=activeFilter==="all"?goals:goals.filter(g=>g.timeframe===activeFilter);
    const getProgress=g=>{
      if(!g.milestones.length)return null;
      const done=g.milestones.filter(m=>m.done).length;
      return{done,total:g.milestones.length,pct:Math.round(done/g.milestones.length*100)};
    };

    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        {/* Header */}
        <div style={{padding:"12px 16px 10px",borderBottom:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:16,color:T.text,fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:8}}>
              <Icon name="Target" size={18} color={accent}/> Goals
            </div>
            <button onClick={()=>setShowNew(true)}
              style={{background:accent,color:"#fff",border:"none",borderRadius:10,padding:"7px 14px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6}}>
              <Icon name="Plus" size={14}/> New Goal
            </button>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto"}} className="hide-scrollbar">
            {[{id:"all",label:"All"},...GOAL_TIMEFRAMES].map(f=>(
              <button key={f.id} onClick={()=>setActiveFilter(f.id)}
                style={{flexShrink:0,padding:"4px 12px",borderRadius:999,border:`1.5px solid ${activeFilter===f.id?accent:T.border}`,background:activeFilter===f.id?accent+"22":"transparent",color:activeFilter===f.id?accent:T.muted,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                {f.emoji?`${f.emoji} `:""}{f.label}
              </button>
            ))}
          </div>
        </div>
        {/* Goals list */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
          {filtered.length===0&&(
            <div style={{textAlign:"center",paddingTop:48}}>
              <div style={{fontSize:40,marginBottom:12}}>🎯</div>
              <div style={{fontSize:16,fontWeight:700,color:T.text,fontFamily:"'Nunito',sans-serif",marginBottom:6}}>No goals yet</div>
              <div style={{fontSize:13,color:T.muted,fontFamily:"'Nunito Sans',sans-serif",marginBottom:20}}>Set a goal to give your tasks direction</div>
              <button onClick={()=>setShowNew(true)} style={{background:accent,color:"#fff",border:"none",borderRadius:12,padding:"12px 24px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Create your first goal</button>
            </div>
          )}
          {filtered.map(g=>{
            const tf=GOAL_TIMEFRAMES.find(t=>t.id===g.timeframe);
            const prog=getProgress(g);
            const linked=tasks.filter(t=>t.goalId===g.id);
            return(
              <div key={g.id} style={{background:T.card,borderRadius:16,padding:"14px 16px",marginBottom:12,border:`1.5px solid ${T.border}`,boxShadow:"0 2px 8px rgba(61,74,92,0.07)"}}>
                {/* Goal header */}
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,background:accent+"22",color:accent,borderRadius:999,padding:"2px 8px",fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{tf?.emoji} {tf?.label}</span>
                      {g.endDate&&<span style={{fontSize:10,color:T.muted,fontFamily:"'Nunito',sans-serif"}}>🎯 {formatDate(g.endDate)}</span>}
                    </div>
                    <div style={{fontSize:15,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif",lineHeight:1.3}}>{g.title}</div>
                  </div>
                  <button onClick={()=>setEditGoal(g)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex",padding:0,marginLeft:8,flexShrink:0}}><Icon name="Pencil" size={15}/></button>
                </div>
                {/* Why */}
                {g.why&&<div style={{fontSize:12,color:T.muted,fontFamily:"'Nunito Sans',sans-serif",fontStyle:"italic",marginBottom:10,lineHeight:1.5,paddingLeft:8,borderLeft:`3px solid ${accent}40`}}>"{g.why}"</div>}
                {/* Progress bar */}
                {prog&&(
                  <div style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:11,color:T.muted,fontFamily:"'Nunito',sans-serif"}}>Progress</span>
                      <span style={{fontSize:11,fontWeight:700,color:prog.pct===100?"#4ade80":accent,fontFamily:"'Nunito',sans-serif"}}>{prog.done}/{prog.total} · {prog.pct}%</span>
                    </div>
                    <div style={{height:6,background:T.subtle,borderRadius:999,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${prog.pct}%`,background:prog.pct===100?"#4ade80":accent,borderRadius:999,transition:"width 0.3s"}}/>
                    </div>
                  </div>
                )}
                {/* Milestones */}
                {g.milestones.length>0&&(
                  <div style={{marginBottom:10}}>
                    {g.milestones.map(m=>{
                      const hasTask=tasks.find(t=>t.id===m.taskId);
                      return(
                        <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.border}30`}}>
                          <button onClick={()=>toggleMilestone(g.id,m.id)}
                            className="tap-target" style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${m.done?"#4ade80":T.muted}`,background:m.done?"#4ade8022":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                            {m.done&&<Icon name="Check" size={9} color="#4ade80"/>}
                          </button>
                          <span style={{flex:1,fontSize:12,color:m.done?T.muted:T.text,fontFamily:"'Nunito',sans-serif",textDecoration:m.done?"line-through":"none"}}>{m.title}</span>
                          {!hasTask?(
                            <button onClick={()=>milestoneToTask(g,m)}
                              style={{fontSize:10,color:accent,fontWeight:700,fontFamily:"'Nunito',sans-serif",background:accent+"18",border:`1px solid ${accent}40`,borderRadius:6,padding:"2px 7px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                              + Task
                            </button>
                          ):(
                            <button onClick={()=>onEditTask(hasTask)}
                              style={{fontSize:10,color:"#7DCFCB",fontWeight:700,fontFamily:"'Nunito',sans-serif",background:"#7DCFCB18",border:"1px solid #7DCFCB40",borderRadius:6,padding:"2px 7px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                              📋 Task
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
                {/* Linked tasks */}
                {((g.linkedTaskIds||[]).length>0||linkingGoal===g.id)&&(
                  <div style={{marginTop:8}}>
                    {(g.linkedTaskIds||[]).map(tid=>{
                      const lt=tasks.find(t=>t.id===tid);
                      if(!lt)return null;
                      const lcat=categories.find(c=>c.id===lt.category);
                      return(
                        <div key={tid} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:T.subtle,borderRadius:8,marginBottom:4}}>
                          <span style={{width:6,height:6,borderRadius:"50%",background:lcat?.color||accent,flexShrink:0}}/>
                          <span style={{flex:1,fontSize:11,color:lt.status==="Done"?T.muted:T.text,fontFamily:"'Nunito',sans-serif",textDecoration:lt.status==="Done"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lt.title}</span>
                          <button onClick={()=>unlinkTask(g.id,tid)} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",padding:0,display:"flex",flexShrink:0}}><Icon name="X" size={10}/></button>
                        </div>
                      );
                    })}
                    {linkingGoal===g.id&&(
                      <div style={{marginTop:6}}>
                        <input autoFocus value={linkSearch} onChange={e=>setLinkSearch(e.target.value)}
                          style={{width:"100%",background:T.card,color:T.text,borderRadius:8,padding:"6px 10px",fontSize:12,border:`1.5px solid ${accent}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif",marginBottom:4}}
                          placeholder="Search tasks to link…"/>
                        {tasks.filter(t=>t.title?.toLowerCase().includes(linkSearch.toLowerCase())&&!(g.linkedTaskIds||[]).includes(t.id)).slice(0,5).map(t=>(
                          <div key={t.id} onClick={()=>linkTaskToGoal(g.id,t.id)}
                            style={{padding:"5px 8px",borderRadius:8,cursor:"pointer",fontSize:11,color:T.text,fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6}}
                            onMouseEnter={e=>e.currentTarget.style.background=accent+"15"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <span style={{width:6,height:6,borderRadius:"50%",background:categories.find(c=>c.id===t.category)?.color||accent}}/>
                            {t.title}
                          </div>
                        ))}
                        <button onClick={()=>{setLinkingGoal(null);setLinkSearch("");}} style={{background:"none",border:"none",color:T.muted,fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",marginTop:4}}>Cancel</button>
                      </div>
                    )}
                    {linkingGoal!==g.id&&<button onClick={()=>setLinkingGoal(g.id)}
                      style={{fontSize:10,color:accent,fontWeight:700,fontFamily:"'Nunito',sans-serif",background:accent+"12",border:`1px solid ${accent}30`,borderRadius:6,padding:"2px 8px",cursor:"pointer",marginTop:4}}>
                      + Link existing task
                    </button>}
                  </div>
                )}
