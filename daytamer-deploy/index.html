  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha512-MOCpqoRoisCTwJ8vQQiciZv0qcpROCidek3GTFS6KTk2+y7munJIlKCVkFCYY+p3ErYFXCjmFjnfTTRSC1OHWQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" integrity="sha512-BfcEFQ1SddlO+7JRhcagE5aEc/jc+KUtCsMGjzwkM4WHPgdHmGaYQPmW9snfgfU73cGW7+9sjdk70YErPPVi0w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { font-family: 'Nunito Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* Expands the tappable area of small controls to ~44px without changing their visible size/layout */
    .tap-target { position: relative; }
    .tap-target::before { content: ""; position: absolute; top: 50%; left: 50%; width: max(44px, 100%); height: max(44px, 100%); transform: translate(-50%, -50%); }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.4; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useContext, createContext, useMemo, useEffect, useCallback } = React;

  // ── Brand Colours (extracted from logo) ──────────────────────────────────────
  // Sun orange: #F5A442  Teal horizon: #7DCFCB  Navy text: #3D4A5C  BG: #F7F3EE

  const THEMES = {
    sunrise: { name:"Sunrise", emoji:"🌅", accent:"#F5A442",
      dark:  { bg:"#1e1710", surface:"#271f14", card:"#302718", border:"#42381e", text:"#f5e8d0", muted:"#ab8a5d", subtle:"#281f13", navBg:"#1e1710" },
      light: { bg:"#F7F3EE", surface:"#FFFFFF", card:"#FFF8F0", border:"#EDD9BC", text:"#3D4A5C", muted:"#736556", subtle:"#F0E8DC", navBg:"#FFFFFF" } },
    teal: { name:"Teal", emoji:"🌊", accent:"#7DCFCB",
      dark:  { bg:"#0f1c1c", surface:"#152424", card:"#1a2d2d", border:"#1f3d3d", text:"#cceeed", muted:"#559e9c", subtle:"#162626", navBg:"#0f1c1c" },
      light: { bg:"#f0fafa", surface:"#ffffff", card:"#e0f5f4", border:"#a8e0de", text:"#0d2e2d", muted:"#3c6f6e", subtle:"#c8eeec", navBg:"#ffffff" } },
    ocean: { name:"Ocean", emoji:"🌊", accent:"#0ea5e9",
      dark:  { bg:"#141e2b", surface:"#1a2739", card:"#1e2f44", border:"#263d56", text:"#c8dff0", muted:"#729bb6", subtle:"#1b2d40", navBg:"#141e2b" },
      light: { bg:"#f0f8ff", surface:"#ffffff", card:"#e4f2fc", border:"#b8d9f0", text:"#0a2744", muted:"#3e6a8c", subtle:"#d0eaf8", navBg:"#ffffff" } },
    slate: { name:"Slate", emoji:"🩶", accent:"#94a3b8",
      dark:  { bg:"#161b24", surface:"#1d2430", card:"#222b38", border:"#2e3a4a", text:"#c8d4e0", muted:"#8494a3", subtle:"#1e2935", navBg:"#161b24" },
      light: { bg:"#f1f5f9", surface:"#ffffff", card:"#e4eaf2", border:"#c0cdd8", text:"#1c2530", muted:"#576579", subtle:"#d8e2ec", navBg:"#ffffff" } },
    midnight: { name:"Midnight", emoji:"🌙", accent:"#b79cf5",
      dark:  { bg:"#16111f", surface:"#1e1629", card:"#251c33", border:"#342550", text:"#d8ccf0", muted:"#8e81b7", subtle:"#1f1730", navBg:"#16111f" },
      light: { bg:"#f5f0ff", surface:"#ffffff", card:"#ede5ff", border:"#c4b0f0", text:"#1a1030", muted:"#6c4cac", subtle:"#ddd5f8", navBg:"#ffffff" } },
    forest: { name:"Forest", emoji:"🌿", accent:"#4ade80",
      dark:  { bg:"#101a13", surface:"#162019", card:"#1b2a1e", border:"#243d28", text:"#bce8c8", muted:"#559e69", subtle:"#162218", navBg:"#101a13" },
      light: { bg:"#f0fdf4", surface:"#ffffff", card:"#dcfce7", border:"#a0d8b0", text:"#0d2614", muted:"#347545", subtle:"#bbf7d0", navBg:"#ffffff" } },
    rose: { name:"Rose", emoji:"🌸", accent:"#fb7185",
      dark:  { bg:"#1c1018", surface:"#241520", card:"#2c1a26", border:"#42243a", text:"#ecc8d8", muted:"#b57593", subtle:"#261520", navBg:"#1c1018" },
      light: { bg:"#fff1f2", surface:"#ffffff", card:"#ffe4ec", border:"#f0a0b8", text:"#2e0d1c", muted:"#9e3a56", subtle:"#fecdd3", navBg:"#ffffff" } },
  };

  const ThemeCtx = createContext(null);
  const useTheme = () => useContext(ThemeCtx);

  // ── Inline SVG Logo — smiling rising sun matching the logo ───────────────────
  function SunLogo({ size = 32 }) {
    return (
      <svg width={size} height={size} viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        {/* Rays */}
        <line x1="40" y1="2" x2="40" y2="12" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        <line x1="18" y1="8" x2="23" y2="17" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        <line x1="62" y1="8" x2="57" y2="17" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        <line x1="5"  y1="28" x2="15" y2="31" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        <line x1="75" y1="28" x2="65" y2="31" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        <line x1="11" y1="50" x2="20" y2="44" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        <line x1="69" y1="50" x2="60" y2="44" stroke="#F5A442" strokeWidth="4" strokeLinecap="round"/>
        {/* Sun body — half circle rising */}
        <path d="M14 46 A26 26 0 0 1 66 46 Z" fill="#F5A442"/>
        {/* Face */}
        <circle cx="32" cy="38" r="2.5" fill="#3D4A5C" opacity="0.5"/>
        <circle cx="48" cy="38" r="2.5" fill="#3D4A5C" opacity="0.5"/>
        <path d="M33 43 Q40 48 47 43" stroke="#3D4A5C" strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.5"/>
        {/* Cheeks */}
        <circle cx="27" cy="42" r="4" fill="#F5A442" opacity="0.4"/>
        <circle cx="53" cy="42" r="4" fill="#F5A442" opacity="0.4"/>
        {/* Teal horizon line */}
        <line x1="8" y1="47" x2="72" y2="47" stroke="#7DCFCB" strokeWidth="3" strokeLinecap="round"/>

    );
  }

  // ── Icons ────────────────────────────────────────────────────────────────────
  const ICONS = {
    X:`<path d="M18 6L6 18M6 6l12 12"/>`,
    Pencil:`<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>`,
    RefreshCw:`<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>`,
    Target:`<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`,
    Search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
    Flag:`<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>`,
    Star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
    Plus:`<path d="M12 5v14M5 12h14"/>`,
    Check:`<path d="M20 6L9 17l-5-5"/>`,
    ChevronLeft:`<path d="M15 18l-6-6 6-6"/>`,
    ChevronRight:`<path d="M9 18l6-6-6-6"/>`,
    ChevronUp:`<path d="M18 15l-6-6-6 6"/>`,
    ChevronDown:`<path d="M6 9l6 6 6-6"/>`,
    Settings:`<circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/>`,
    Trash2:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>`,
    Clock:`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
    AlertCircle:`<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`,
    Download:`<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>`,
    Upload:`<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>`,
    LayoutDashboard:`<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>`,
    List:`<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>`,
    Calendar:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
    CalendarDays:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/>`,
    CalendarRange:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h2M14 14h2M8 18h8"/>`,
    Sun:`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`,
    Moon:`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`,
    User:`<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
    CalendarCheck:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/>`,
  };
  const Icon = ({name,size=18,color="currentColor"}) => {
    const p=ICONS[name]; if(!p) return null;
    return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",flexShrink:0}} dangerouslySetInnerHTML={{__html:p}}/>;
  };

  // ── Helpers ──────────────────────────────────────────────────────────────────
  const uid = () => Math.random().toString(36).slice(2,10);
  const PRIORITY_WEIGHT = {High:1,Med:2,Low:3};
  const PRIORITY_COLORS = {High:"#ef4444",Med:"#f59e0b",Low:"#94a3b8"};
  const STATUS_COLORS   = {"Not Started":"#94a3b8","In Progress":"#7DCFCB","Done":"#4ade80"};
  const EST_OPTIONS = [15,30,45,60,90,120,180,240];
  const EST_LABELS  = {15:"15m",30:"30m",45:"45m",60:"1h",90:"1.5h",120:"2h",180:"3h",240:"4h+"};
  const fmtMins = m => { if(!m)return"—"; if(EST_LABELS[m])return EST_LABELS[m]; if(m<60)return m+"m"; const h=Math.floor(m/60),r=m%60; return r===0?h+"h":h+"h "+r+"m"; };
  const formatDate = d => { if(!d)return""; return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
  const formatTime = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); const ap=h<12?"am":"pm"; return `${h===0?12:h>12?h-12:h}:${String(m).padStart(2,"0")}${ap}`; };
  const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
  const DAYS_OF_WEEK = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DEFAULT_CATEGORIES = [{id:"personal",name:"Personal",color:"#22c55e"},{id:"work",name:"Work",color:"#3b82f6"},{id:"health",name:"Health",color:"#f43f5e"},{id:"home",name:"Home",color:"#f59e0b"}];
  const DEFAULT_SORTS = [
    {id:"daily",name:"Daily Planning",levels:[{field:"dueDate",dir:"asc"},{field:"priority",dir:"asc"}]},
    {id:"quickwins",name:"Quick Wins",levels:[{field:"estMinutes",dir:"asc"},{field:"priority",dir:"asc"}]},
  ];
  const SORT_FIELDS = [
    {value:"scheduledDateTime",label:"Scheduled Date & Time"},{value:"scheduledDate",label:"Scheduled Date"},
    {value:"title",label:"Task Name"},{value:"dueDate",label:"Due Date"},{value:"priority",label:"Priority"},{value:"category",label:"Category"},
    {value:"status",label:"Status"},{value:"estMinutes",label:"Est. Time"},{value:"sequence",label:"Sequence"},{value:"createdAt",label:"Date Added"},
  ];

  function applySortLevels(tasks,levels,cats) {
    if(!levels.length)return tasks;
    return [...tasks].sort((a,b)=>{
      for(const {field,dir} of levels){
        let av,bv;
        if(field==="priority"){av=PRIORITY_WEIGHT[a.priority];bv=PRIORITY_WEIGHT[b.priority];}
        else if(field==="category"){av=cats.find(c=>c.id===a.category)?.name||"";bv=cats.find(c=>c.id===b.category)?.name||"";}
        else if(field==="scheduledDateTime"){
          av=(a.scheduledDate||"9999-12-31")+"T"+(a.scheduledTime||"99:99");
          bv=(b.scheduledDate||"9999-12-31")+"T"+(b.scheduledTime||"99:99");
        }
        else{av=a[field]??"";bv=b[field]??"";}
        if(av<bv)return dir==="asc"?-1:1; if(av>bv)return dir==="asc"?1:-1;
      }
      return 0;
    });
  }
  function weekDates(anchor){const d=new Date(anchor+"T00:00:00"),day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-day+(day===0?-6:1));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().slice(0,10);});}
  function monthDates(year,month){const first=new Date(year,month,1),last=new Date(year,month+1,0),startDay=first.getDay()===0?6:first.getDay()-1,days=[];for(let i=0;i<startDay;i++)days.push(null);for(let d=1;d<=last.getDate();d++)days.push(new Date(year,month,d).toISOString().slice(0,10));return days;}

  // ── RFC4180 CSV helpers (handles empty fields, embedded commas/quotes/newlines) ──
  const csvField = v => { const s=String(v??""); return /[",\n\r]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
  const csvStringify = rows => rows.map(row=>row.map(csvField).join(",")).join("\r\n");
  function csvParse(text){
    const rows=[]; let row=[],field="",inQuotes=false;
    for(let i=0;i<text.length;i++){
      const c=text[i];
      if(inQuotes){
        if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQuotes=false; }
        else field+=c;
      } else {
        if(c==='"') inQuotes=true;
        else if(c===','){row.push(field);field="";}
        else if(c==='\r'){ /* ignore, \n below ends the row */ }
        else if(c==='\n'){row.push(field);rows.push(row);row=[];field="";}
        else field+=c;
      }
    }
    if(field.length||row.length){row.push(field);rows.push(row);}
    return rows;
  }

  // ── Modal accessibility: Escape-to-close, focus trap, focus restoration ──
  const FOCUSABLE_SEL = 'a[href],button:not([disabled]),textarea:not([disabled]),input:not([disabled]),select:not([disabled]),[tabindex]:not([tabindex="-1"])';
  function useModalA11y(onClose){
    const ref = useRef(null);
    const onCloseRef = useRef(onClose);
    onCloseRef.current = onClose;
    useEffect(() => {
      const prevFocused = document.activeElement;
      const container = ref.current;
      const getFocusable = () => container ? Array.from(container.querySelectorAll(FOCUSABLE_SEL)).filter(el=>el.offsetParent!==null) : [];
      (getFocusable()[0]||container)?.focus?.();
      const handleKeyDown = e => {
        if(e.key==="Escape"){ e.stopPropagation(); onCloseRef.current&&onCloseRef.current(); return; }
        if(e.key==="Tab"){
          const focusable = getFocusable();
          if(!focusable.length) return;
          const first=focusable[0], last=focusable[focusable.length-1];
          if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
          else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
        }
      };
      document.addEventListener("keydown", handleKeyDown, true);
      return () => {
        document.removeEventListener("keydown", handleKeyDown, true);
        if(prevFocused && prevFocused.focus) prevFocused.focus();
      };
    }, []);
    return ref;
  }

  // ── Primitives ────────────────────────────────────────────────────────────────
  const PriorityBadge = ({p}) => <span style={{background:PRIORITY_COLORS[p]+"20",color:PRIORITY_COLORS[p],border:`1px solid ${PRIORITY_COLORS[p]}40`,fontSize:11,padding:"2px 8px",borderRadius:999,fontWeight:700,letterSpacing:"0.03em",fontFamily:"'Nunito',sans-serif"}}>{p}</span>;
  const StatusPill = ({s}) => <span style={{background:STATUS_COLORS[s]+"20",color:STATUS_COLORS[s],fontSize:11,padding:"2px 8px",borderRadius:999,whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif"}}>{s}</span>;
  const CatDot = ({color}) => <span style={{background:color,display:"inline-block",width:7,height:7,borderRadius:"50%",marginRight:4,flexShrink:0}}/>;
  const AssigneePill = ({name,muted,accent}) => {
    if(!name||name==="Me")return <span style={{fontSize:11,color:muted,display:"inline-flex",alignItems:"center",gap:3}}><Icon name="User" size={10} color={muted}/>Me</span>;
    return <span style={{fontSize:11,color:"#7DCFCB",display:"inline-flex",alignItems:"center",gap:3,background:"#7DCFCB18",padding:"2px 7px",borderRadius:999,fontWeight:600}}><Icon name="User" size={10} color="#7DCFCB"/>{name}</span>;
  };

  // ── Today Header ──────────────────────────────────────────────────────────────
  function TodayHeader({T, accent, doneCnt, totalAll, totalActive}) {
    const now = new Date();
    const hrs = now.getHours();
    const greeting = hrs<12?"Good morning":hrs<17?"Good afternoon":"Good evening";
    const pct = totalAll===0?0:Math.round((doneCnt/totalAll)*100);
    return (
      <div style={{background:`linear-gradient(160deg, ${T.surface} 0%, ${T.subtle} 100%)`, borderBottom:`1px solid ${T.border}`, padding:"20px 16px 16px"}}>

  // ── Focus Mode ────────────────────────────────────────────────────────────────
  function FocusMode({task, onDone, onGiveUp}){
    const {T, accent} = useTheme();
    const modalRef = useModalA11y(onGiveUp);
    const totalSecs = (task.estMinutes||25) * 60;
    // Use wall-clock time so timer keeps running when screen locks / app backgrounds
    const endTimeRef = useRef(Date.now() + totalSecs * 1000);
    const pausedAtRef = useRef(null); // stores remaining ms when paused
    const [secsLeft, setSecsLeft] = useState(totalSecs);
    const [running, setRunning] = useState(true);
    const [finished, setFinished] = useState(false);
    const intervalRef = useRef(null);
    const audioCtxRef = useRef(null);

    const playChime = () => {
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        audioCtxRef.current = ctx;
        const notes = [523.25, 659.25, 783.99, 1046.5];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = "sine";
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.18;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
          osc.start(t); osc.stop(t + 0.65);
        });
      } catch(e){}
    };

    const vibrate = () => {
      try { navigator.vibrate&&navigator.vibrate([200,100,200,100,400]); } catch(e){}
    };

    useEffect(() => {
      if(!running || finished) return;
      const tick = () => {
        const remaining = Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000));
        setSecsLeft(remaining);
        if(remaining <= 0){
          clearInterval(intervalRef.current);
          setRunning(false);
          setFinished(true);
          playChime();
          vibrate();
        }
      };
      tick(); // immediate update when resuming after background
      intervalRef.current = setInterval(tick, 500); // 500ms so it catches up quickly after unlock
      return () => clearInterval(intervalRef.current);
    }, [running, finished]);

    // Also recalc on visibility change (screen unlock / tab focus)
    useEffect(() => {
      const onVisible = () => {
        if(running && !finished){
          const remaining = Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000));
          setSecsLeft(remaining);
        }
      };
      document.addEventListener("visibilitychange", onVisible);
      return () => document.removeEventListener("visibilitychange", onVisible);
    }, [running, finished]);

    const togglePause = () => {
      if(finished) return;
      if(running){
        // Pausing — store remaining ms
        pausedAtRef.current = endTimeRef.current - Date.now();
      } else {
        // Resuming — push end time forward by remaining ms
        endTimeRef.current = Date.now() + (pausedAtRef.current || secsLeft * 1000);
      }
      setRunning(r => !r);
    };

    const mins = Math.floor(secsLeft / 60);
    const secs = secsLeft % 60;
    const pct = ((totalSecs - secsLeft) / totalSecs) * 100;
    const isLow = secsLeft < 60 && secsLeft > 0;

    // Radial progress ring
    const R = 88, C = 2 * Math.PI * R;
    const dash = C * (1 - pct/100);

    return(
      <div ref={modalRef} role="dialog" aria-modal="true" aria-label="Focus Mode" tabIndex={-1} style={{position:"fixed",inset:0,zIndex:70,display:"flex",flexDirection:"column",background:T.bg,outline:"none"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
          <button onClick={onGiveUp} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:13,fontFamily:"'Nunito',sans-serif",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
            <Icon name="X" size={16}/> Give up
          </button>
          <div style={{fontSize:13,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif"}}>Focus Mode</div>
          <div style={{width:60}}/>
        </div>

        {/* Main content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 24px 40px",gap:24}}>

          {/* Task title */}
          <div style={{textAlign:"center",maxWidth:300}}>
            <div style={{fontSize:11,color:accent,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,fontFamily:"'Nunito',sans-serif"}}>Working on</div>
            <div style={{fontSize:22,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif",lineHeight:1.3}}>{task.title}</div>
            {task.notes&&<div style={{fontSize:13,color:T.muted,marginTop:8,fontFamily:"'Nunito Sans',sans-serif",lineHeight:1.5}}>{task.notes}</div>}
          </div>

          {/* Timer ring */}
          {!finished ? (
            <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:8}}>
              <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
                <circle cx={100} cy={100} r={R} fill="none" stroke={T.border} strokeWidth={10}/>
                <circle cx={100} cy={100} r={R} fill="none"
                  stroke={isLow?"#ef4444":accent} strokeWidth={10}
                  strokeDasharray={C} strokeDashoffset={dash}
                  strokeLinecap="round"
                  style={{transition:"stroke-dashoffset 0.9s linear, stroke 0.5s"}}/>
              </svg>
              <div style={{position:"absolute",textAlign:"center"}}>
                <div style={{fontSize:42,fontWeight:800,color:isLow?"#ef4444":T.text,fontFamily:"'Nunito',sans-serif",letterSpacing:"-0.02em",lineHeight:1}}>
                  {String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}
                </div>
                <div style={{fontSize:11,color:T.muted,marginTop:4,fontFamily:"'Nunito',sans-serif"}}>{running?"in progress":"paused"}</div>
              </div>
            </div>
          ) : (
            <div style={{textAlign:"center",padding:"24px 0"}}>
              <div style={{fontSize:56,marginBottom:8}}>⏰</div>
              <div style={{fontSize:20,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif",marginBottom:6}}>Time's up!</div>
              <div style={{fontSize:14,color:T.muted,fontFamily:"'Nunito Sans',sans-serif"}}>Did you finish the task?</div>
            </div>
          )}

          {/* Controls */}
          {!finished ? (
            <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:280}}>
              <button onClick={togglePause}
                style={{padding:"16px",borderRadius:16,background:running?accent+"18":accent,border:running?`2px solid ${accent}`:"none",color:running?accent:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:running?"none":`0 4px 16px ${accent}50`,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {running ? "⏸ Pause" : "▶ Resume"}
              </button>
              <button onClick={()=>{ clearInterval(intervalRef.current); setFinished(true); setRunning(false); playChime(); vibrate(); }}
                style={{padding:"13px",borderRadius:16,background:"transparent",border:`1.5px solid #4ade80`,color:"#4ade80",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                ✓ Done early
              </button>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:280}}>
              <button onClick={()=>onDone(true)}
                style={{padding:"16px",borderRadius:16,background:"#4ade80",border:"none",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 16px #4ade8060",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                🎉 Yes, I completed it!
              </button>
              <button onClick={()=>onDone(false)}
                style={{padding:"13px",borderRadius:16,background:"transparent",border:`1.5px solid ${T.border}`,color:T.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                Not quite — put it back
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Spin the Wheel ────────────────────────────────────────────────────────────
  function SpinWheel({tasks, categories, onClose, onResult, onFocus}){
    const [poolMode, setPoolMode] = useState('all'); // 'all' | 'unscheduled'
    const [filterCats, setFilterCats] = useState([]); // empty = all categories
    const {T, accent} = useTheme();
    const modalRef = useModalA11y(onClose);
    const canvasRef = useRef(null);
    const [spinning, setSpinning] = useState(false);
    const [winner, setWinner] = useState(null);
    const [confetti, setConfetti] = useState([]);
    const spinRef = useRef({angle:0, velocity:0, raf:null});
    const toggleCat = id => setFilterCats(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
    const pool = tasks.filter(t=>
      t.status!=="Done" &&
      (poolMode==="all"||!t.scheduledDate) &&
      (filterCats.length===0||filterCats.includes(t.category))
    );

    const WHEEL_COLORS = [
      "#F5A442","#7DCFCB","#fb7185","#4ade80","#b79cf5","#60a5fa","#f59e0b",
      "#34d399","#f472b6","#a78bfa","#38bdf8","#fbbf24"
    ];

    const drawWheel = (angle) => {
      const canvas = canvasRef.current;
      if(!canvas || pool.length === 0) return;
      const ctx = canvas.getContext("2d");
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const r = cx - 4;
      const slice = (2 * Math.PI) / pool.length;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw segments
      pool.forEach((t, i) => {
        const start = angle + i * slice;
        const end = start + slice;
        const color = WHEEL_COLORS[i % WHEEL_COLORS.length];

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${pool.length > 8 ? 10 : 12}px Nunito, sans-serif`;
        const maxLen = pool.length > 8 ? 12 : 16;
        const label = t.title.length > maxLen ? t.title.slice(0, maxLen) + "…" : t.title;
        ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.shadowBlur = 3;
        ctx.fillText(label, r - 10, 4);
        ctx.restore();
      });

      // Center cap
      ctx.beginPath();
      ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.strokeStyle = accent;
      ctx.lineWidth = 3;
      ctx.stroke();

      // Sun emoji in center
      ctx.font = "16px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("🌅", cx, cy);
    };

    useEffect(() => {
      if(pool.length > 0) drawWheel(spinRef.current.angle);
    }, [pool.length, poolMode, filterCats.length]);

    const launchConfetti = () => {
      const pieces = Array.from({length: 60}, (_, i) => ({
        id: i,
        x: Math.random() * 100,
        y: -10 - Math.random() * 20,
        vx: (Math.random() - 0.5) * 3,
        vy: 2 + Math.random() * 4,
        color: WHEEL_COLORS[i % WHEEL_COLORS.length],
        rot: Math.random() * 360,
        size: 6 + Math.random() * 6,
        shape: Math.random() > 0.5 ? "rect" : "circle"
      }));
      setConfetti(pieces);
      let frame = 0;
      const animate = () => {
        if(frame++ > 80) { setConfetti([]); return; }
        setConfetti(p => p.map(c => ({...c, y: c.y + c.vy, x: c.x + c.vx, rot: c.rot + 5, vy: c.vy + 0.1})));
        requestAnimationFrame(animate);
      };
      requestAnimationFrame(animate);
    };

    const spin = () => {
      if(spinning || pool.length === 0) return;
      setSpinning(true);
      setWinner(null);
      const s = spinRef.current;
      s.velocity = 0.25 + Math.random() * 0.2;
      const decel = 0.992 + Math.random() * 0.004;
      const tick = () => {
        s.angle += s.velocity;
        s.velocity *= decel;
        drawWheel(s.angle);
        if(s.velocity > 0.003) {
          s.raf = requestAnimationFrame(tick);
        } else {
          // Pointer is at top = -PI/2 in canvas coords.
          // Segments start at s.angle (right = 0), so segment i spans [s.angle + i*slice, s.angle + (i+1)*slice].
          // The pointer angle in wheel-space = -PI/2, so we find which segment contains -PI/2.
          const slice = (2 * Math.PI) / pool.length;
          const pointerAngle = -Math.PI / 2;
          const norm = (((pointerAngle - s.angle) % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
          const idx = Math.floor(norm / slice) % pool.length;
          const won = pool[idx];
          setWinner(won);
          setSpinning(false);
          launchConfetti();
          onResult(won.id);
        }
      };
      s.raf = requestAnimationFrame(tick);
    };

    if(pool.length === 0) return (
      <div style={{position:"fixed",inset:0,zIndex:60,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div ref={modalRef} role="dialog" aria-modal="true" aria-label="Spin the Wheel" tabIndex={-1} style={{background:T.surface,borderRadius:24,padding:32,textAlign:"center",maxWidth:320,width:"100%",outline:"none"}}>
          <div style={{fontSize:48,marginBottom:16}}>😴</div>
          <div style={{fontSize:17,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif",marginBottom:8}}>No tasks to spin!</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:24,fontFamily:"'Nunito Sans',sans-serif"}}>Add some tasks first, then let fate decide.</div>
          <button onClick={onClose} style={{background:accent,color:"#fff",border:"none",borderRadius:12,padding:"12px 32px",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Got it</button>
        </div>
      </div>
    );

    return(
      <div style={{position:"fixed",inset:0,zIndex:60,background:"rgba(0,0,0,0.75)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
        {/* Confetti layer */}
        <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:61}}>
          {confetti.map(c=>(
            <div key={c.id} style={{
              position:"absolute", left:`${c.x}%`, top:`${c.y}%`,
              width:c.size, height:c.shape==="rect"?c.size*0.6:c.size,
              borderRadius:c.shape==="circle"?"50%":"2px",
              background:c.color, transform:`rotate(${c.rot}deg)`, opacity:0.9
            }}/>
          ))}
        </div>

        <div ref={modalRef} role="dialog" aria-modal="true" aria-label="Spin the Wheel" tabIndex={-1} style={{background:T.surface,borderRadius:28,padding:"20px 20px 24px",width:"100%",maxWidth:380,position:"relative",zIndex:62,outline:"none"}}>
          {/* Header */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:18,color:T.text,fontFamily:"'Nunito',sans-serif"}}>🎡 Spin the Wheel</div>
            <button onClick={()=>{cancelAnimationFrame(spinRef.current.raf);onClose();}} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="X" size={20}/></button>
          </div>
          <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:`1.5px solid ${T.border}`,marginBottom:10,flexShrink:0}}>
            {[{id:"all",label:"All tasks"},{id:"unscheduled",label:"Unscheduled only"}].map(m=>(
              <button key={m.id} onClick={()=>{setPoolMode(m.id);spinRef.current.angle=0;}} style={{flex:1,padding:"7px 4px",background:poolMode===m.id?accent+"22":"transparent",color:poolMode===m.id?accent:T.muted,border:"none",borderRight:m.id==="all"?`1px solid ${T.border}`:"none",fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>
                {m.label}
              </button>
            ))}
          </div>
          {/* Category filter */}
          <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,flexShrink:0}} className="hide-scrollbar">
            {categories.map(c=>{
              const active=filterCats.includes(c.id);
              return(
                <button key={c.id} onClick={()=>{toggleCat(c.id);spinRef.current.angle=0;}}
                  style={{flexShrink:0,border:`2px solid ${active?c.color:T.border}`,background:active?c.color+"22":T.card,color:active?c.color:T.muted,padding:"4px 12px",borderRadius:999,fontSize:11,fontWeight:active?700:500,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:active?c.color:T.muted,display:"inline-block",flexShrink:0}}/>
                  {c.name}
                </button>
              );
            })}
            {filterCats.length>0&&<button onClick={()=>{setFilterCats([]);spinRef.current.angle=0;}} style={{flexShrink:0,border:`1.5px solid ${T.border}`,background:"transparent",color:T.muted,padding:"4px 10px",borderRadius:999,fontSize:11,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Clear</button>}
          </div>

          {/* Pointer */}
          <div style={{position:"relative",display:"flex",justifyContent:"center",marginBottom:4}}>
            <div style={{position:"absolute",top:-2,zIndex:2,width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderTop:`22px solid ${accent}`,filter:`drop-shadow(0 2px 4px ${accent}80)`}}/>
            <canvas ref={canvasRef} width={300} height={300} style={{borderRadius:"50%",boxShadow:`0 8px 32px rgba(0,0,0,0.25), 0 0 0 4px ${accent}40`}}/>
          </div>

          {/* Winner reveal */}
          {winner ? (
            <div style={{marginTop:16,background:accent+"18",border:`2px solid ${accent}40`,borderRadius:16,padding:"14px 16px",textAlign:"center"}}>
              <div style={{fontSize:12,color:accent,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4,fontFamily:"'Nunito',sans-serif"}}>The wheel has spoken! 🎉</div>
              <div style={{fontSize:16,fontWeight:800,color:T.text,fontFamily:"'Nunito',sans-serif",marginBottom:4}}>{winner.title}</div>
              <div style={{fontSize:12,color:T.muted,fontFamily:"'Nunito Sans',sans-serif"}}>Marked as <span style={{color:"#7DCFCB",fontWeight:700}}>In Progress</span> ✓</div>
              <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center"}}>
                <button onClick={spin} style={{background:T.card,color:T.text,border:`1.5px solid ${T.border}`,borderRadius:10,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Spin again</button>
                <button onClick={()=>onFocus(winner)} style={{background:accent,color:"#fff",border:"none",borderRadius:10,padding:"8px 20px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:`0 2px 8px ${accent}50`}}>Let's go! 🚀</button>
              </div>
            </div>
          ) : (
            <button onClick={spin} disabled={spinning}
              style={{width:"100%",marginTop:16,padding:"14px",borderRadius:16,background:spinning?"transparent":accent,border:spinning?`2px solid ${accent}`:"none",color:spinning?accent:"#fff",fontSize:15,fontWeight:800,cursor:spinning?"default":"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:spinning?"none":`0 4px 16px ${accent}50`,transition:"all 0.2s",letterSpacing:"0.02em"}}>
              {spinning ? "Spinning… 🌀" : "🎡 SPIN!"}
            </button>
          )}
        </div>
      </div>
    );
  }

  // ── Today Tab ─────────────────────────────────────────────────────────────────
  function TodayTab({tasks,goals=[],categories,onEdit,onStatusChange,onGoToDay,onGoToGoals,onSpin,onFocus,onAddTask,onPlanDay,defaultCat="personal"}){
    const {T,accent}=useTheme();
    const today=todayStr();
    const [quickTitle,setQuickTitle]=useState("");
    const quickInputRef=useRef(null);
    const [quickFocused,setQuickFocused]=useState(false);
    const [quickPriority,setQuickPriority]=useState("Med");
    const [quickCat,setQuickCat]=useState(defaultCat||"personal");
    const [quickMins,setQuickMins]=useState(30);
    const [quickDate,setQuickDate]=useState("");
    const [quickTime,setQuickTime]=useState("");
    const [quickSchedMode,setQuickSchedMode]=useState("none"); // none | today | later
    const overdue=tasks.filter(t=>t.status!=="Done"&&t.dueDate&&t.dueDate<today);
    const dueToday=tasks.filter(t=>t.status!=="Done"&&t.dueDate===today);
    const scheduledToday=tasks.filter(t=>t.scheduledDate===today).sort((a,b)=>a.scheduledTime>b.scheduledTime?1:-1);
    const totalActive=tasks.filter(t=>t.status!=="Done").length;
    const doneCnt=tasks.filter(t=>t.status==="Done").length;
    const totalAll=tasks.length;

    const handleQuickAdd=()=>{
      if(!quickTitle.trim())return;
      onAddTask({id:uid(),title:quickTitle.trim(),notes:"",category:quickCat,priority:quickPriority,sequence:tasks.length+1,dueDate:"",estMinutes:quickMins,status:"Not Started",assignedTo:"Me",scheduledDate:quickDate,scheduledTime:quickTime,createdAt:new Date().toISOString()});
      setQuickTitle("");
      setQuickDate("");
      setQuickTime("");
      setQuickSchedMode("none");
    };

    const TaskCard=({t,showTime=false})=>{
      const cat=categories.find(c=>c.id===t.category);
      const isOverdue=t.dueDate&&t.dueDate<today&&t.status!=="Done";
      return(
        <div style={{background:T.card,borderRadius:14,borderLeft:`4px solid ${cat?.color||accent}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,marginBottom:8,boxShadow:"0 1px 4px rgba(61,74,92,0.08)"}}>
          <button onClick={()=>onStatusChange(t.id,t.status==="Done"?"Not Started":"Done")} className="tap-target" style={{width:22,height:22,borderRadius:"50%",border:`2.5px solid ${t.status==="Done"?"#4ade80":T.muted}`,background:t.status==="Done"?"#4ade8022":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {t.status==="Done"&&<Icon name="Check" size={11} color="#4ade80"/>}
          </button>
          <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onEdit(t)}>
            <div style={{color:T.text,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:3,fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:5}}>
              {isOverdue&&<Icon name="AlertCircle" size={11} color="#ef4444"/>}
              {t.title}
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
              <PriorityBadge p={t.priority}/>
              {showTime&&t.scheduledTime&&<span style={{fontSize:11,color:"#7DCFCB",fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{formatTime(t.scheduledTime)}</span>}
              {t.dueDate&&<span style={{fontSize:11,color:isOverdue?"#ef4444":T.muted}}>{formatDate(t.dueDate)}</span>}
              <span style={{fontSize:11,color:T.muted,display:"flex",alignItems:"center",gap:2}}><Icon name="Clock" size={10}/>{fmtMins(t.estMinutes)}</span>
              {t.assignedTo&&t.assignedTo!=="Me"&&<AssigneePill name={t.assignedTo} muted={T.muted} accent={accent}/>}
            </div>
          </div>
          {/* Focus button */}
          {t.status!=="Done"&&<button onClick={e=>{e.stopPropagation();onFocus(t);}} title="Start focus timer"
            style={{width:28,height:28,borderRadius:8,background:accent+"18",border:`1.5px solid ${accent}40`,color:accent,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12}}>
            ▶
          </button>}
        </div>
      );
    };

    const Section=({label,col,items,showTime=false})=>{
      if(!items.length)return null;
      return(
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:11,color:col,textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:700,fontFamily:"'Nunito',sans-serif"}}>{label}</span>
            <span style={{fontSize:11,color:col,background:col+"20",borderRadius:999,padding:"0 8px",fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>{items.length}</span>
          </div>
          {items.map(t=><TaskCard key={t.id} t={t} showTime={showTime}/>)}
        </div>
      );
    };

    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%",overflowY:"auto",position:"relative"}}>
        <TodayHeader T={T} accent={accent} doneCnt={doneCnt} totalAll={totalAll} totalActive={totalActive}/>

        {/* Plan my day */}
        <div style={{padding:"10px 16px 0"}}>
          <button onClick={onPlanDay} style={{width:"100%",padding:"13px",borderRadius:14,background:`linear-gradient(135deg, ${accent}, ${accent}cc)`,border:"none",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:`0 4px 16px ${accent}40`,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <Icon name="Target" size={16} color="#fff"/> Plan my day
          </button>
        </div>

        {/* Quick add bar */}
        <div style={{padding:"10px 16px 0"}}>
          <div style={{display:"flex",gap:8,marginBottom:quickTitle?8:0}}>
            <input ref={quickInputRef} value={quickTitle} onChange={e=>setQuickTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleQuickAdd()}
              onFocus={()=>setQuickFocused(true)} onBlur={()=>setQuickFocused(false)}
              style={{flex:1,background:T.card,color:T.text,borderRadius:12,padding:"10px 14px",fontSize:14,border:`1.5px solid ${quickTitle||quickFocused?accent:T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif",transition:"border 0.15s",boxShadow:quickFocused?`0 0 0 3px ${accent}25`:"none"}}
              placeholder="Start typing to quick add…"/>
            <button onClick={()=>quickTitle.trim()?handleQuickAdd():quickInputRef.current?.focus()}
              style={{background:quickTitle.trim()?accent:T.subtle,color:quickTitle.trim()?"#fff":T.muted,border:"none",borderRadius:12,padding:"0 14px",cursor:"pointer",display:"flex",alignItems:"center",boxShadow:quickTitle.trim()?`0 2px 8px ${accent}50`:"none",transition:"background 0.15s"}}>
              <Icon name={quickTitle.trim()?"Check":"Plus"} size={18}/>
            </button>
          </div>
          {quickTitle&&(
            <div style={{background:T.card,borderRadius:12,padding:"10px 12px",border:`1.5px solid ${accent}30`,display:"flex",flexDirection:"column",gap:8}}>
              {/* Priority */}
              <div style={{display:"flex",gap:6}}>
                {["High","Med","Low"].map(p=>(
                  <button key={p} onClick={()=>setQuickPriority(p)}
                    style={{flex:1,border:`2px solid ${quickPriority===p?PRIORITY_COLORS[p]:"transparent"}`,background:quickPriority===p?PRIORITY_COLORS[p]+"22":T.subtle,color:quickPriority===p?PRIORITY_COLORS[p]:T.muted,padding:"5px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                    {p}
                  </button>
                ))}
              </div>
              {/* Category */}
              <div style={{display:"flex",gap:6,overflowX:"auto"}} className="hide-scrollbar">
                {categories.map(c=>(
                  <button key={c.id} onClick={()=>setQuickCat(c.id)}
                    style={{flexShrink:0,border:`2px solid ${quickCat===c.id?c.color:"transparent"}`,background:quickCat===c.id?c.color+"22":T.subtle,color:quickCat===c.id?c.color:T.muted,padding:"4px 10px",borderRadius:999,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:4}}>
                    {quickCat===c.id&&<span style={{width:6,height:6,borderRadius:"50%",background:c.color,display:"inline-block"}}/>}
                    {c.name}
                  </button>
                ))}
              </div>
              {/* Est time */}
              <div style={{display:"flex",gap:6,overflowX:"auto"}} className="hide-scrollbar">
                {[15,30,45,60,90,120].map(m=>(
                  <button key={m} onClick={()=>setQuickMins(m)}
                    style={{flexShrink:0,border:`2px solid ${quickMins===m?accent:"transparent"}`,background:quickMins===m?accent+"22":T.subtle,color:quickMins===m?accent:T.muted,padding:"4px 10px",borderRadius:999,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                    {fmtMins(m)}
                  </button>
                ))}
              </div>
              {/* Schedule */}
              <div style={{display:"flex",gap:6,marginBottom:quickSchedMode!=="none"?6:0}}>
                {[{id:"none",label:"No date"},{id:"today",label:"Today"},{id:"later",label:"Schedule later"}].map(opt=>(
                  <button key={opt.id} onClick={()=>{
                    setQuickSchedMode(opt.id);
                    if(opt.id==="today"){setQuickDate(todayStr());} 
                    else if(opt.id==="none"){setQuickDate("");setQuickTime("");}
                  }}
                    style={{flex:1,padding:"5px 4px",borderRadius:8,border:`2px solid ${quickSchedMode===opt.id?accent:"transparent"}`,background:quickSchedMode===opt.id?accent+"22":T.subtle,color:quickSchedMode===opt.id?accent:T.muted,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>
                    {opt.label}
                  </button>
                ))}
              </div>
              {quickSchedMode!=="none"&&(
                <div style={{display:"flex",gap:6}}>
                  {quickSchedMode==="later"&&(
                    <div style={{flex:1,position:"relative"}}>
                      <input type="date" value={quickDate} onChange={e=>setQuickDate(e.target.value)}
                        style={{width:"100%",background:T.card,color:quickDate?T.text:T.muted,borderRadius:10,padding:"6px 10px",fontSize:12,border:`1.5px solid ${quickDate?accent:T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"}}/>
                    </div>
                  )}
                  <div style={{flex:1,position:"relative"}}>
                    <input type="time" value={quickTime} onChange={e=>setQuickTime(e.target.value)}
                      style={{width:"100%",background:T.card,color:quickTime?T.text:T.muted,borderRadius:10,padding:"6px 10px",fontSize:12,border:`1.5px solid ${quickTime?accent:T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"}}
                      placeholder="Time (optional)"/>
                    {quickTime&&<button onClick={()=>setQuickTime("")} className="tap-target" style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.muted,cursor:"pointer",padding:0,display:"flex"}}><Icon name="X" size={10}/></button>}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Goals summary */}
        {goals.filter(g=>(g.timeframe==="day"||g.timeframe==="week")&&!(g.milestones.length>0&&g.milestones.every(m=>m.done))).length>0&&(
          <div style={{padding:"10px 16px 0"}}>
            {goals.filter(g=>(g.timeframe==="day"||g.timeframe==="week")&&!(g.milestones.length>0&&g.milestones.every(m=>m.done))).map(g=>{
              const done=g.milestones.filter(m=>m.done).length;
              const total=g.milestones.length;
              const pct=total?Math.round(done/total*100):0;
              const tf=GOAL_TIMEFRAMES.find(t=>t.id===g.timeframe);
              return(
                <div key={g.id} onClick={()=>onGoToGoals&&onGoToGoals()} style={{background:T.card,borderRadius:12,padding:"10px 14px",marginBottom:8,border:`1.5px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=accent}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
                  <Icon name="Target" size={16} color={accent}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:T.text,fontFamily:"'Nunito',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.title}</div>
                    <div style={{fontSize:10,color:T.muted,fontFamily:"'Nunito',sans-serif"}}>{tf?.emoji} {tf?.label}{total?` · ${done}/${total} milestones`:""}</div>
                    {total>0&&<div style={{height:3,background:T.subtle,borderRadius:999,marginTop:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#4ade80":accent,borderRadius:999}}/></div>}
                  </div>
                  <Icon name="ChevronRight" size={14} color={T.muted}/>
                </div>
              );
            })}
          </div>
        )}
        {/* Spin the Wheel button */}
        <div style={{padding:"10px 16px 0"}}>
          <button onClick={onSpin}
            style={{width:"100%",padding:"13px",borderRadius:14,background:`linear-gradient(135deg, #F5A442, #F0C070)`,border:"none",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:"0 4px 16px rgba(245,164,66,0.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,letterSpacing:"0.01em"}}>
            🎡 Spin the Wheel — Let fate decide!
          </button>
        </div>

        <div style={{padding:"16px 16px 24px"}}>
          <Section label="Overdue" col="#ef4444" items={overdue}/>
          <Section label="Due Today" col={accent} items={dueToday}/>
          <Section label="Scheduled Today" col="#7DCFCB" items={scheduledToday} showTime={true}/>
          {overdue.length===0&&dueToday.length===0&&scheduledToday.length===0&&(
            <div style={{textAlign:"center",padding:"24px 0 16px"}}>
              <div style={{marginBottom:12,display:"flex",justifyContent:"center"}}><SunLogo size={56}/></div>
              <div style={{color:T.text,fontWeight:800,fontSize:17,marginBottom:6,fontFamily:"'Nunito',sans-serif"}}>You're all clear!</div>
              <div style={{color:T.muted,fontSize:13,fontFamily:"'Nunito Sans',sans-serif"}}>Nothing due or scheduled today.</div>
            </div>
          )}
          {/* Task list link */}
          <button onClick={()=>onGoToDay("list")} style={{width:"100%",marginTop:8,marginBottom:8,padding:"12px",borderRadius:14,background:"transparent",border:`1.5px solid ${T.border}`,color:T.muted,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Icon name="List" size={14} color={T.muted}/> View all tasks
          </button>
          <button onClick={()=>onGoToDay("day")} style={{width:"100%",padding:"12px",borderRadius:14,background:"linear-gradient(135deg, #F5A44220, #F5A44210)",border:"1.5px solid #F5A44250",color:"#F5A442",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Icon name="Calendar" size={14} color="#F5A442"/> Open Day Planner
          </button>
        </div>
      </div>
    );
  }

  // ── Task Modal ────────────────────────────────────────────────────────────────
  function TaskModal({task,categories,onSave,onDelete,onClose}){
    const {T,accent}=useTheme();
    const modalRef = useModalA11y(onClose);
    const [t,setT]=useState({assignedTo:"Me",...task});
    const set=(k,v)=>setT(p=>({...p,[k]:v}));
    const inp={width:"100%",background:T.card,color:T.text,borderRadius:12,padding:"10px 14px",fontSize:14,border:`1.5px solid ${T.border}`,outline:"none",fontFamily:"'Nunito Sans',sans-serif"};
    const lbl={fontSize:11,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:700,fontFamily:"'Nunito',sans-serif"};
    return(
      <div ref={modalRef} role="dialog" aria-modal="true" aria-label="Task Details" tabIndex={-1} style={{position:"fixed",inset:0,zIndex:50,display:"flex",flexDirection:"column",background:T.bg,outline:"none"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
          <button onClick={onClose} className="tap-target" style={{background:"none",border:"none",color:T.muted,cursor:"pointer",display:"flex"}}><Icon name="X" size={20}/></button>
          <span style={{fontWeight:800,color:T.text,fontSize:15,fontFamily:"'Nunito',sans-serif"}}>Task Details</span>
          <button onClick={()=>onSave(t)} style={{background:accent,color:"#fff",border:"none",borderRadius:10,padding:"7px 16px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Nunito',sans-serif",boxShadow:`0 2px 8px ${accent}40`}}>Save</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:16}}>
          <input value={t.title||""} onChange={e=>set("title",e.target.value)} style={{...inp,fontSize:16,fontWeight:700,fontFamily:"'Nunito',sans-serif"}} placeholder="Task title"/>
          <textarea value={t.notes||""} onChange={e=>{set("notes",e.target.value);e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}} style={{...inp,resize:"none",minHeight:90,overflow:"hidden"}} rows={4} placeholder="Notes (optional)"/>
          <div>
